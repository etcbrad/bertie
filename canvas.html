#stage.free{transition:none}
#stage.free{cursor:grab}
#stage.free.dragging{cursor:grabbing}

/* canvas layers */
#bl-cvs,#pp-cvs{position:absolute;inset:0}
#bl-cvs{pointer-events:none;opacity:0;transition:opacity .5s;z-index:1}
#stage.backlit #bl-cvs{opacity:1}
#stage.negative{filter:invert(1)}
#pp-cvs{z-index:3}

/* light dot */
#ldot{
  position:absolute;width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle,#fff 20%,rgba(220,240,255,.5) 60%,transparent 100%);
  border:1.5px solid rgba(255,255,255,.35);
  transform:translate(-50%,-50%);cursor:crosshair;
  display:none;opacity:0;z-index:20;
  box-shadow:0 0 10px 3px rgba(200,230,255,.65);
  transition:opacity .15s;
}
#stage.backlit #ldot{display:block}
#stage.backlit #ldot:hover{opacity:.38}
#ldot.show{opacity:1!important;transition:none}

/* resize handles — hidden when locked */
.rh{position:absolute;z-index:10;display:none}
#stage.free .rh{display:block}
.rh-corner{width:16px;height:16px}
.rh-edge-h{height:10px;left:16px;right:16px}
.rh-edge-v{width:10px;top:16px;bottom:16px}
.rh-nw{top:-6px;left:-6px;cursor:nw-resize}
.rh-ne{top:-6px;right:-6px;cursor:ne-resize}
.rh-sw{bottom:-6px;left:-6px;cursor:sw-resize}
.rh-se{bottom:-6px;right:-6px;cursor:se-resize}
.rh-n{top:-6px;cursor:n-resize}.rh-s{bottom:-6px;cursor:s-resize}
.rh-w{left:-6px;cursor:w-resize}.rh-e{right:-6px;cursor:e-resize}

/* bar */
/* ── Corner controls ─────────────────────────────────────────────────── */
/* ctrl-lock and light-corner now live in toolbar — keep IDs but restyle */
#ctrl-lock{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;background:#1a2e24;border:1px solid #3d6e52;padding:8px 10px;
  color:#8ecfa8;transition:color .15s,background .15s,border-color .15s;
  min-width:44px;min-height:44px;box-sizing:border-box;justify-content:center;
}
#ctrl-lock:hover{background:#243d30;border-color:#52a070;color:#b8f0cc}
#ctrl-lock.on{background:#2d5038;border-color:#6abf88;color:#b8d820}
#ctrl-lock .cl{font-family:'Courier New',monospace;font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:inherit;white-space:nowrap}
/* light corner in toolbar */
#cg-light-corner{position:relative;display:flex;flex-direction:column;align-items:center}
#cg-light-corner .sdock{
  position:absolute;bottom:calc(100% + 4px);left:50%;
  transform:translateX(-50%) translateY(4px);
  background:#1a2e24;border:1px solid #3d6e52;border-radius:4px;overflow:hidden;
  opacity:0;pointer-events:none;transition:opacity .16s,transform .16s;min-width:44px;
}
#cg-light-corner.open .sdock{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}
#cb-light-corner{
  display:flex;flex-direction:column;align-items:center;gap:3px;justify-content:center;
  cursor:pointer;background:#1a2e24;border:1px solid #3d6e52;padding:8px 10px;
  color:#8ecfa8;width:48px;height:48px;box-sizing:border-box;
  transition:color .15s,background .15s,border-color .15s;
}
#cb-light-corner:hover{background:#243d30;border-color:#52a070;color:#b8f0cc}
#cb-light-corner.on{background:#2d5038;border-color:#6abf88;color:#b8d820}
#cb-light-corner .cl{font-family:'Courier New',monospace;font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:inherit;white-space:nowrap}

/* Top toolbar: FK/IK + chain buttons, horizontally scrollable */
#toolbar-top{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:#121e18;border-bottom:1px solid #3d6e52;
  display:flex;align-items:center;justify-content:center;
  gap:0;z-index:300;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  pointer-events:auto;
}
#toolbar-top>*{flex-shrink:0;pointer-events:auto;z-index:301;}
#toolbar-top .cg{pointer-events:auto;z-index:302;}
#toolbar-top .cb{pointer-events:auto;z-index:303;position:relative;}
#toolbar-top::-webkit-scrollbar{display:none}
#toolbar-top.hidden{transform:translateY(-100%)}

/* Bottom toolbar: lights, lock, ratio, masks */
#toolbar{
  position:fixed;bottom:0;left:0;right:0;height:48px;
  background:#121e18;border-top:1px solid #3d6e52;
  display:flex;align-items:stretch;justify-content:center;
  gap:0;z-index:250;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  pointer-events:auto;
}
#toolbar>*{flex-shrink:0;pointer-events:auto;z-index:251;}
#toolbar .cg{pointer-events:auto;z-index:252;}
#toolbar .cb{pointer-events:auto;z-index:253;position:relative;}
#toolbar.hidden{transform:translateY(100%)}
/* divider */
.tb-div{width:1px;background:#3d6e52;opacity:.4;margin:0 2px;align-self:stretch}

/* control group */
.cg{position:relative;display:flex;flex-direction:column;align-items:center}

/* sub-dock — rendered in #dock-overlay, not inline */
.sdock{
  display:none; /* hidden in DOM; cloned to overlay when open */
}
/* The live floating dock in #dock-overlay */
#dock-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:450;
}
.dock-float{
  position:absolute;
  display:flex;flex-direction:column;gap:0;align-items:stretch;
  pointer-events:all;
  background:#1a2e24;border:1px solid #3d6e52;border-radius:6px;overflow:hidden;
  min-width:120px;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
  animation:dockIn .12s ease;
}
@keyframes dockIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.dock-float .sr{display:flex;gap:0}
.dock-float .sb{border-top:1px solid #2a4a38;border-radius:0}
.dock-float .sb:first-child{border-top:none}
.sr{display:flex;gap:0;align-items:center}
.sb{
  display:flex;align-items:center;justify-content:center;
  width:44px;height:36px;cursor:pointer;
  background:#1a2e24;border:none;border-top:1px solid #2a4a38;border-radius:0;
  color:#8ecfa8;transition:background .12s,color .12s;flex-shrink:0;box-sizing:border-box;
}
.sb:hover{background:#243d30;color:#b8f0cc}
.sb.active{background:#2d5038;color:#b8d820}
.sb.dim{opacity:.62;pointer-events:none;filter:brightness(.7)}
.sb svg{width:14px;height:14px;pointer-events:none}
.sc{font-family:'Courier New',monospace;font-size:9px;color:#8ecfa8;min-width:14px;text-align:center}

/* main buttons */
.cb{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;background:#1a2e24;border:1px solid #3d6e52;padding:4px 4px;border-radius:0;
  color:#8ecfa8;opacity:1;margin:0;
  transition:color .15s,background .15s,border-color .15s;
  min-width:48px;height:48px;box-sizing:border-box;flex-shrink:0;gap:2px;
}
.cb:hover{background:#243d30;border-color:#52a070;color:#b8f0cc}
.cb.on,.cb.active{color:#b8d820;background:#2d5038;border-color:#6abf88}
.cb.dim{opacity:.40;pointer-events:none;filter:grayscale(.5)}
.cb-icon{width:26px;height:26px}
.cl{font-family:'Courier New',monospace;font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:inherit;white-space:nowrap}


/* ratio — single cycling square button */
#ratio-btn{
  width:48px;height:48px;cursor:pointer;flex-shrink:0;
  background:#1a2e24;border:none;border-left:1px solid #3d6e52;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:#8ecfa8;transition:background .15s,color .15s;box-sizing:border-box;padding:6px;
}
#ratio-btn:hover{background:#243d30;color:#b8f0cc}
#ratio-btn.active{background:#2d5038;color:#b8d820}
#ratio-rect{
  border:1.5px solid currentColor;
  transition:width .18s cubic-bezier(.4,0,.2,1), height .18s cubic-bezier(.4,0,.2,1);
}
#ratio-label{
  font-family:'Courier New',monospace;font-size:7px;letter-spacing:.12em;
  color:inherit;white-space:nowrap;
}

#szb.pulse{animation:pulse .6s ease}
@keyframes pulse{0%{opacity:.5}50%{opacity:1;color:#b8d820}100%{opacity:.5}}

/* tooltip */

/* ── Mask side panel ───────────────────────── */
#mask-panel{
  position:fixed;bottom:52px;left:4px;
  width:210px;border:1px solid #3d6e52;border-radius:6px;
  z-index:500;padding:8px 10px 10px 12px;
  display:none;flex-direction:column;gap:6px;
  max-height:calc(100vh - 80px);overflow-y:auto;background:#121e18}
#mask-panel.open{display:flex}
#mask-panel h3{font-family:'Courier New',monospace;font-size:7px;letter-spacing:.2em;
  color:#6abf88;text-transform:uppercase;padding-bottom:5px;
  border-bottom:1px solid #3d6e52;margin-bottom:2px}
.ms{display:flex;flex-direction:column;gap:3px;padding-bottom:6px;border-bottom:1px solid #2a4a38}
.ms-lbl{font-family:'Courier New',monospace;font-size:6.5px;letter-spacing:.14em;color:#5a9474;text-transform:uppercase}
.ms-row{display:flex;gap:5px;align-items:center}
.ms-thumb{width:38px;height:38px;border:1px solid #3d6e52;border-radius:2px;
  background:#1a2e24;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#5a9474;font-size:16px;flex-shrink:0;

/* ── Data panel ─────────────────────────────────────────────────────── */
#data-panel{

  transition:opacity .16s, transform .16s;
}
#data-panel.open{display:flex}
#data-panel.visible{opacity:1;transform:translateY(0)}
#data-panel-tabs{
  display:flex;border-bottom:1px solid #3d6e52;flex-shrink:0;
}
.dp-tab{
  flex:1;padding:9px 4px;font-family:'Courier New',monospace;font-size:8.5px;

  border:none;cursor:pointer;border-bottom:2px solid transparent;
  transition:color .12s,border-color .12s;
}
.dp-tab:hover{color:#8ecfa8}
.dp-tab.active{color:#b8d820;border-bottom-color:#b8d820}
.dp-pane{display:none;flex-direction:column;gap:8px;padding:10px;overflow-y:auto;flex:1}
.dp-pane.active{display:flex}
.dp-label{font-family:'Courier New',monospace;font-size:7.5px;letter-spacing:.12em;

.dp-textarea{

  color:#b8f0cc;background:#060e0a;border:1px solid #3d6e52;
  border-radius:3px;padding:7px;box-sizing:border-box;outline:none;
  tab-size:2;
}
.dp-textarea:focus{border-color:#6abf88}
.dp-btn-row{display:flex;gap:6px}
.dp-btn{
  flex:1;font-family:'Courier New',monospace;font-size:8px;letter-spacing:.08em;
  text-transform:uppercase;color:#8ecfa8;background:#1a2e24;border:1px solid #3d6e52;
  padding:7px 8px;cursor:pointer;border-radius:3px;transition:all .12s;
}
.dp-btn:hover{background:#243d30;border-color:#52a070;color:#b8f0cc}
.dp-btn.primary{background:#2d5038;border-color:#6abf88;color:#b8d820}
.dp-btn.primary:hover{background:#3a6645;border-color:#80d890}
.dp-status{font-family:'Courier New',monospace;font-size:8px;color:#5a9474;
  min-height:16px;transition:color .2s}
.dp-status.ok{color:#b8d820}
.dp-status.err{color:#e05050}
#btn-data{
  width:48px;height:48px;box-sizing:border-box;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;background:#1a2e24;border:none;border-left:1px solid #3d6e52;
  color:#8ecfa8;transition:color .15s,background .15s;pointer-events:all;
}
#btn-data:hover{background:#243d30;color:#b8f0cc}
#btn-data.on{background:#2d5038;border-color:#6abf88;color:#b8d820}
#btn-data .bmk-l{font-family:'Courier New',monospace;font-size:6px;letter-spacing:.14em;
  color:inherit;text-transform:uppercase;white-space:nowrap}

/* tween speed control */
.dp-row{display:flex;align-items:center;gap:8px}
.dp-slider{
  flex:1;-webkit-appearance:none;appearance:none;height:3px;
  background:#3d6e52;border-radius:2px;outline:none;cursor:pointer;
}
.dp-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:#b8d820;cursor:pointer;
}
.dp-slider::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:#b8d820;
  border:none;cursor:pointer;
}
.dp-speed-lbl{font-family:'Courier New',monospace;font-size:7px;
  color:#5a9474;white-space:nowrap;min-width:42px;text-align:right;}

/* ── Toolbar scroll wrappers ───────────────────────────────────────────────── */
.tb-scroll-wrap{
  position:relative;flex:1;overflow:hidden;display:flex;align-items:stretch;min-width:0;
}
.tb-scroll-inner{
  display:flex;align-items:stretch;gap:0;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;scroll-behavior:auto;flex:1;
}
.tb-scroll-inner::-webkit-scrollbar{display:none}
.tb-arrow{
  position:absolute;top:0;bottom:0;width:28px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(to right,#121e18 60%,transparent);
  color:#3d6e52;cursor:pointer;z-index:10;border:none;padding:0;
  opacity:0;transition:opacity .15s;pointer-events:none;flex-shrink:0;
}
.tb-arrow.right{right:0;left:auto;background:linear-gradient(to left,#121e18 60%,transparent)}
.tb-scroll-wrap:hover .tb-arrow{opacity:1;pointer-events:all}
.tb-arrow:hover{color:#b8d820}
.tb-arrow svg{width:14px;height:14px}

/* ── Pose slot rail A–Z ─────────────────────────────────────────────────────── */
#tween-group{display:flex;align-items:stretch;flex-shrink:0}
#pose-rail-min{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;background:#1a2e24;border:none;border-left:1px solid #3d6e52;
  color:#5a9474;width:22px;height:48px;box-sizing:border-box;flex-shrink:0;
  transition:color .12s,background .12s;
}
#pose-rail-min:hover{background:#243d30;color:#b8f0cc}
#pose-rail-min svg{width:10px;height:10px}
.pose-slot{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;background:#1a2e24;border:none;border-left:1px solid #3d6e52;
  color:#8ecfa8;
  /* compact default — just wide enough for the letter */
  width:24px;height:48px;box-sizing:border-box;
  transition:color .12s,background .12s,width .18s ease;
  flex-shrink:0;position:relative;
  font-family:'Courier New',monospace;overflow:hidden;padding:1px 0;
}
/* expand on hover to show thumbnail */
.pose-slot:hover,.pose-slot.active,.pose-slot.playing{width:40px}
.pose-slot:hover{background:#243d30;color:#b8f0cc}
.pose-slot.filled{border-bottom:2px solid #3d6e52}
.pose-slot.active{background:#2d5038;border-bottom:2px solid #b8d820;color:#b8d820}
.pose-slot.playing{background:#2d5038;color:#b8d820}
/* dragging state */
.pose-slot.drag-over{outline:2px solid #b8d820;outline-offset:-2px}
.pose-slot.dragging{opacity:.4}
.pose-slot-lbl{font-size:10px;font-weight:bold;letter-spacing:.04em;line-height:1;flex-shrink:0;transition:font-size .12s}
/* thumb — hidden until expanded */
.pose-thumb{
  width:34px;height:24px;border:1px solid #2a4a38;border-radius:2px;
  display:block;opacity:0;max-height:0;overflow:hidden;
  transition:opacity .15s,max-height .18s ease;
  background:#0e1a14;flex-shrink:0;object-fit:contain;
}
.pose-slot:hover .pose-thumb,
.pose-slot.active .pose-thumb,
.pose-slot.playing .pose-thumb{max-height:28px;opacity:.9}
.pose-slot:not(.filled) .pose-thumb{opacity:0!important;max-height:0!important}
.pose-dot{
  width:4px;height:4px;border-radius:50%;background:#2a4a38;
  position:absolute;top:4px;right:4px;transition:background .12s;flex-shrink:0;
}
.pose-slot.filled .pose-dot{background:#b8d820}
.pose-slot.active .pose-dot{background:#fff}
.pose-slot.playing .pose-dot{background:#b8d820;box-shadow:0 0 4px #b8d820}

/* bank switcher — always visible, nav between unlimited banks */
#bank-nav{

}
.bank-nav-btn{
  display:flex;align-items:center;justify-content:center;

}

/* library manage bar */
#lib-bar{
  position:fixed;bottom:52px;left:50%;transform:translateX(-50%);

#seq-play,#seq-stop{

<script>
// ── Configuration Constants ─────────────────────────────────────────────────────────────
const CONFIG = {
  // Puppet proportions
  BICEP_SEGMENT_SCALE: 40,
  TORSO_HEIGHT_SCALE: 2.2,
  HEAD_SCALE: 1.3,
  ARM_SCALE: 2,
  LEG_SCALE: 3,
  THIGH_SCALE: 1.5,
  SHIN_SCALE: 1.5,
  
  // IK solver constants
  MAX_ITERATIONS: 20,
  CONVERGENCE_THRESHOLD: 0.001,
  
  // UI constants
  BORDER_PADDING: 16,
  DEFAULT_ASPECT_RATIO: 4/3,
  
  // Rendering constants
  ANCHOR_RADIUS: 5,
  SELECTED_LINE_WIDTH: 1.8,
  DEFAULT_LINE_WIDTH: 1,
  TORSO_ALPHA: 0.82,
  PADDING: 10
};

// ── Bertie Physics (rigid cutout) ─────────────────────────────────────────────
const DEG = Math.PI / 180;
const PHYSICS = {
  style: 'smooth',          // 'smooth' default; use 'bertie' for rigid + stepped
  snapDeg: 7.5,             // angular snap step (degrees)
  snapInFK: true,
  snapInIK: true,
  snapInTween: true,
  enforceLimits: true,
  ikIterations: 10,         // fewer iterations = more rigid/less smooth
  ikEpsilon: 0.75           // larger epsilon = less precise, more rigid
};

// Joint limits (degrees) inspired by joint_definitions.json
const JOINT_LIMITS_DEG = {
  head:     [{min:-45, max:45}],
  // Elbows/knees are directional hinges (refined)
  leftArm:  [{maxAbs:160}, {min:-150, max:0}],
  rightArm: [{maxAbs:160}, {min:0, max:150}],
  leftLeg:  [{min:-120, max:45}, {min:-150, max:0}],
  rightLeg: [{min:-120, max:45}, {min:0, max:150}]
};

const JOINT_LIMITS = Object.fromEntries(
  Object.entries(JOINT_LIMITS_DEG).map(([k,arr])=>[
    k,
    arr.map(l=>(
      l.maxAbs!=null
        ? {maxAbs:l.maxAbs*DEG}
        : {min:(l.min??0)*DEG, max:(l.max??0)*DEG}
    ))
  ])
);

// ── math ─────────────────────────────────────────────────────────────────────
const v2      = (x,y)  => ({x,y});
const v2add   = (a,b)  => ({x:a.x+b.x,y:a.y+b.y});
const v2sub   = (a,b)  => ({x:a.x-b.x,y:a.y-b.y});
const v2len   = v      => Math.hypot(v.x,v.y);
const v2norm  = v      => {const l=v2len(v);return l<1e-9?v2(0,0):v2(v.x/l,v.y/l)};
const v2scale = (v,s)  => ({x:v.x*s,y:v.y*s});
const v2angle = v      => Math.atan2(v.y,v.x);
const v2fa    = (a,l)  => ({x:Math.cos(a)*l,y:Math.sin(a)*l});
const v2rot_  = (v,a)  => ({x:v.x*Math.cos(a)-v.y*Math.sin(a),y:v.x*Math.sin(a)+v.y*Math.cos(a)});

const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));
const normAngle = a => {while(a> Math.PI)a-=2*Math.PI;while(a<-Math.PI)a+=2*Math.PI;return a;};
const snapAngle = (a,deg)=>{
  if(!deg || deg<=0) return a;
  const s=deg*DEG;
  return Math.round(a/s)*s;
};

// ── chain ────────────────────────────────────────────────────────────────────
class Chain {
  constructor(n,len,id,limits){
    this.id=id; this.handleId=id+'_H';
    this.limits=limits||[];
    this.segs=this._build(n,len);
  }
  _build(n,total){
    const l=total/n;
    return Array.from({length:n},(_,i)=>({
      id: i===n-1?this.handleId:this.id+'_'+i,
      length:l, role:i===0?'PROXIMAL':'DISTAL',
      rigidity:false, localAngle:0, influence:0, committed:false
    }));
  }
  _constrainLocal(i, local, ctx){
    if(PHYSICS.style!=='bertie') return local;
    let out = normAngle(local);
    const lim=this.limits?.[i];
    if(PHYSICS.enforceLimits && lim){
      if(typeof lim.maxAbs==='number') out=clamp(out,-lim.maxAbs,lim.maxAbs);
      else {
        const min=Number.isFinite(lim.min)?lim.min:-Infinity;
        const max=Number.isFinite(lim.max)?lim.max: Infinity;
        out=clamp(out,min,max);
      }
    }
    const doSnap =
      (ctx==='FK'   && PHYSICS.snapInFK) ||
      (ctx==='IK'   && PHYSICS.snapInIK) ||
      (ctx==='TWEEN'&& PHYSICS.snapInTween) ||
      (ctx==='DRAG' && PHYSICS.snapInFK);
    if(doSnap) out=snapAngle(out, PHYSICS.snapDeg);
    return out;
  }
  constrainLocal(i, local, ctx='FK'){return this._constrainLocal(i, local, ctx)}
  get totalLength(){return this.segs.reduce((s,g)=>s+g.length,0)}
  get count(){return this.segs.length}

  addAtCenter(n=1){
    if(n<1)return;
    const tot=this.totalLength,nc=this.segs.length+n,l=tot/nc;
    const [p,...rest]=this.segs, h=rest.pop(), mid=rest;
    const ins=Array.from({length:n},(_,i)=>({
      id:this.id+'_i'+i+Date.now(),length:l,role:'DISTAL',
      rigidity:false,localAngle:p.localAngle,influence:0,committed:false
    }));
    const r=s=>({...s,length:l});
    this.segs=[r(p),...ins,...mid.map(r),r(h)];
  }
  removeAtCenter(n=1){
    const safe=Math.min(n,this.segs.length-2);if(safe<1)return;
    const tot=this.totalLength,nc=this.segs.length-safe,l=tot/nc;
    const p=this.segs[0],h=this.segs[this.segs.length-1];
    const mid=this.segs.slice(1+safe,-1);
    const r=s=>({...s,length:l});
    this.segs=[r(p),...mid.map(r),r(h)];
  }

  // FK: worldAngle[i] = worldAngle[i-1] + localAngle[i] + influence[i] * prevLocalAngle
  solveFK(rootPos,rootWA,rootDelta=0){
    try {
      if (!rootPos || typeof rootWA !== 'number' || !isFinite(rootWA)) {
        throw new Error('Invalid root position or angle');
      }
      
      const js=[];let pos={...rootPos},wa=rootWA,prev=rootDelta;
      for(let i=0;i<this.segs.length;i++){
        const s=this.segs[i];
        if (!s || typeof s.length !== 'number' || s.length <= 0) {
          throw new Error('Invalid segment configuration');
        }
        js.push({position:{...pos},worldAngle:wa});
        const influence = PHYSICS.style==='bertie' ? 0 : s.influence;
        let local = s.committed ? s.localAngle : (s.localAngle + influence*prev);
        local = this._constrainLocal(i, local, 'FK');
        const out = s.rigidity ? wa : (wa + local);
        pos=v2add(pos,v2fa(out,s.length));
        prev = s.rigidity ? 0 : local;
        wa=out;
      }
      js.push({position:{...pos},worldAngle:wa});
      return js;
    } catch (error) {
      console.error('Error in solveFK:', error);
      return this.solveFK(rootPos, rootWA, 0); // Fallback to simple solve
    }
  }

  // FABRIK IK
  solveIK(rootPos,rootWA,target){
    try {
      if (!rootPos || typeof rootWA !== 'number' || !isFinite(rootWA) || !target) {
        throw new Error('Invalid IK parameters');
      }
      
      const n=this.segs.length,lens=this.segs.map(s=>s.length),tot=this.totalLength;
      let pts=this.solveFK(rootPos,rootWA).map(j=>({...j.position}));
      
      if(v2len(v2sub(target,rootPos))>=tot){
        const a=v2angle(v2sub(target,rootPos));
        pts=[{...rootPos}];
        for(let i=0;i<n;i++)pts.push(v2add(pts[i],v2fa(a,lens[i])));
      } else {
        const maxIter = PHYSICS.style==='bertie' ? PHYSICS.ikIterations : CONFIG.MAX_ITERATIONS;
        const eps = PHYSICS.style==='bertie' ? PHYSICS.ikEpsilon : CONFIG.CONVERGENCE_THRESHOLD;
        for(let it=0;it<maxIter;it++){
          pts[n]={...target};
          for(let i=n-1;i>=0;i--){
            const d=v2norm(v2sub(pts[i],pts[i+1]));
            if (!d || !isFinite(d.x) || !isFinite(d.y)) {
              throw new Error('Invalid direction vector in IK');
            }
            pts[i]=v2add(pts[i+1],v2scale(d,lens[i]));
          }
          pts[0]={...rootPos};
          for(let i=0;i<n;i++){
            const d=v2norm(v2sub(pts[i+1],pts[i]));
            if (!d || !isFinite(d.x) || !isFinite(d.y)) {
              throw new Error('Invalid direction vector in IK');
            }
            pts[i+1]=v2add(pts[i],v2scale(d,lens[i]));
          }
          if(v2len(v2sub(pts[n],target))<eps)break;
        }
      }
      
      let pwa=rootWA;
      for(let i=0;i<n;i++){
        const s=this.segs[i];
        let local=0;
        if(s.rigidity){
          local=0;
        } else if(s.committed){
          local=s.localAngle;
        } else {
          const wa=v2angle(v2sub(pts[i+1],pts[i]));
          local=this._constrainLocal(i, wa-pwa, 'IK');
          this.segs[i]={...s,localAngle:local,influence:0};
        }
        pwa=pwa+local;
      }
      return this.solveFK(rootPos,rootWA,0);
    } catch (error) {
      console.error('Error in solveIK:', error);
      return this.solveFK(rootPos, rootWA, 0); // Fallback to FK
    }
  }

  setInfluence(i,v){if(i>=0&&i<this.segs.length)this.segs[i]={...this.segs[i],influence:v}}
  setRigidity(i,v){if(i>=0&&i<this.segs.length)this.segs[i]={...this.segs[i],rigidity:v}}
  commit(i,joints){
    if(i<0||i>=this.segs.length)return;
    const pwa=joints[i].worldAngle,cwa=joints[i+1]?.worldAngle??pwa;
    this.segs[i]={...this.segs[i],localAngle:cwa-pwa,influence:0,committed:true};
  }
  uncommit(i){if(i>=0&&i<this.segs.length)this.segs[i]={...this.segs[i],committed:false}}
}

// ── puppet ────────────────────────────────────────────────────────────────────
const TAGS=['head','leftArm','rightArm','leftLeg','rightLeg'];
const REST=-Math.PI/2;

class Puppet {
  constructor(s=1){
    this.s=s;
    // bic = one bicep segment length — base unit for all proportions
    // ── Proportions keyed to bic (arm segment) ─────────────────────────────
    // bic   = 1 arm segment
    // head  = 1.3 bic  (neck anchor at top, ear ~1 bic down, piece ends at 1.3 bic)
    // arm   = 1 bic per segment (2 segs = 2 bic total each arm)
    // thigh = 1.5 bic, shin = 1.5 bic  (total leg = 3 bic)
    // torso = 1.5 bic tall, 1 bic wide at shoulders
    // Shoulder corners sit 10% below neck apex (high, per cutout silhouette)
    // Hip base: 33% narrower than shoulders
    // Right arm + head share neck anchor V0
    // Left arm mounts at left shoulder corner V4
    // Legs mount at hip corners; right leg at center base
    const bic = CONFIG.BICEP_SEGMENT_SCALE*s;
    this.tw = bic;         // shoulder half-span total = 1 bic
    this.th = CONFIG.TORSO_HEIGHT_SCALE*bic;     // torso height: corners raised to arm level
    const tw=this.tw, th=this.th;
    // Pentagon vertices (torso-local, y-down):
    // V0 neck apex:    (0,          -th/2)      top point  (arm mount)
    // V1 r-shoulder:   (tw/2,       -th/2)      SAME Y as V0 — corner at bicep line
    // V2 r-hip:        (tw*0.335,    th/2)       33% narrower at base
    // V3 l-hip:        (-tw*0.335,   th/2)
    // V4 l-shoulder:   (-tw/2,      -th/2)       SAME Y as V0 — flat shoulder line
    this.chains={
      head:     new Chain(1, bic*CONFIG.HEAD_SCALE,  'head',     JOINT_LIMITS.head),
      leftArm:  new Chain(2, bic*CONFIG.ARM_SCALE,    'leftArm',  JOINT_LIMITS.leftArm),
      rightArm: new Chain(2, bic*CONFIG.ARM_SCALE,    'rightArm', JOINT_LIMITS.rightArm),
      leftLeg:  new Chain(2, bic*CONFIG.LEG_SCALE,    'leftLeg',  JOINT_LIMITS.leftLeg),   // 2 segs × 1.5 bic = 3 bic total
      rightLeg: new Chain(2, bic*CONFIG.LEG_SCALE,    'rightLeg', JOINT_LIMITS.rightLeg),
    };
    this.mounts={
      head:     {off:v2(0,           -th/2),     ang:-Math.PI/2}, // V0 neck apex
      rightArm: {off:v2(0,           -th/2),     ang:0},          // V0 shared with head
      leftArm:  {off:v2(-tw/2,       -th/2),     ang:-Math.PI},   // V4 l-shoulder at bicep line
      leftLeg:  {off:v2(-tw*0.335,    th/2),     ang:Math.PI/2},  // V3 l-hip
      rightLeg: {off:v2(0,            th/2),     ang:Math.PI/2},  // center base
    };
    // Z-order back→front: rightArm, rightLeg, head, torso, leftLeg, leftArm
    this.layerOrder = ['rightArm','rightLeg','head','torso','leftLeg','leftArm'];
    this.layerVis   = {rightArm:true,rightLeg:true,head:true,torso:true,leftLeg:true,leftArm:true};
  }
  solve(tp,ta,mode,targets){
    const d=ta-REST,res={};
    for(const t of TAGS){
      const m=this.mounts[t];
      const mp=v2add(tp,v2rot_(m.off,d));
      const ma=m.ang+d;
      res[t]=(mode==='IK'&&targets[t])?this.chains[t].solveIK(mp,ma,targets[t]):this.chains[t].solveFK(mp,ma,ta);
    }
    return {tp,ta,chains:res};
  }
  handles(res){
    const h={};
    for(const t of TAGS){const j=res.chains[t];h[t]={...j[j.length-1].position};}
    return h;
  }
}

// ── render ────────────────────────────────────────────────────────────────────
const C={
  bone:'rgba(90,55,160,.88)',
  accent:'#b8d820',
  push:'rgba(123,69,230,.82)',
  pull:'rgba(220,70,70,.82)',
  commit:'rgba(90,185,100,.78)',
  torsoFill:'rgba(33,20,60,.90)',
  anchor:'rgba(155,200,30,.62)',
  anchorDim:'rgba(155,200,30,.28)',
};

function render(ctx,W,H,puppet,res,sel,mode){
  ctx.clearRect(0,0,W,H);
  const {tp,ta,chains}=res;
  const lo=puppet.layerOrder, lv=puppet.layerVis;

  for(const layer of lo){
    if(!lv[layer]) continue;

    if(layer==='torso'){
      // ── Torso render — collar + 1/2/3 torso segments ─────────────────────
      ctx.save(); ctx.translate(tp.x,tp.y); ctx.rotate(ta+Math.PI/2);
      const tw=puppet.tw, th=puppet.th, bic=tw;
      const isSel = sel==='torso';
      const strokeCol = isSel ? C.accent : 'rgba(50,30,89,.42)';
      const lw = isSel ? 1.8 : 1;
      ctx.globalAlpha = 0.82;

      // ── Helper: lerp x at given y within the trapezoid ───────────────────
      // Left edge: from (-tw/2, -th/2) to (-tw*0.335, th/2)
      // Right edge: from (tw/2, -th/2) to (tw*0.335, th/2)
      function xAtY(y) {
        const t = (y - (-th/2)) / th; // 0=top, 1=bottom
        const rx =  tw/2 + t*( tw*0.335 -  tw/2);
        const lx = -tw/2 + t*(-tw*0.335 - -tw/2);
        return {l:lx, r:rx};
      }

      // Segment split Y positions (within torso, top=-th/2, bot=th/2)
      // 1-piece: full torso, no splits
      // 2-piece: split at 0 (mid)   → upper half + lower half
      // 3-piece: split at -th/6 and th/3  → upper third, mid third, waist third
      const splits = torsoSegments===2 ? [0] :
                     torsoSegments===3 ? [-th/6, th/3] : [];

      // Draw each torso segment (bottom to top so fills overlap correctly)
      const segEdges = [-th/2, ...splits, th/2];
      ctx.fillStyle = C.torsoFill;
      ctx.strokeStyle = strokeCol;
      ctx.lineWidth = lw;
      for(let i=0; i<segEdges.length-1; i++){
        const yTop=segEdges[i], yBot=segEdges[i+1];
        const top=xAtY(yTop), bot=xAtY(yBot);
        ctx.beginPath();
        ctx.moveTo(top.l, yTop);
        ctx.lineTo(top.r, yTop);
        ctx.lineTo(bot.r, yBot);
        ctx.lineTo(bot.l, yBot);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }

      // Shoulder corner grab points
      ctx.shadowBlur=mode==='FK'?10:0; ctx.shadowColor=C.accent;
      ctx.fillStyle=mode==='FK'?C.anchor:C.anchorDim;
      ctx.globalAlpha=1.0;
      const dotR=mode==='FK'?5:2.5;
      ctx.beginPath(); ctx.arc( tw/2,-th/2,dotR,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-tw/2,-th/2,dotR,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;

      // ── Collar triangle (always 1 piece — rigid neck) ─────────────────────
      const tipY = -th/2 - bic*0.867;
      ctx.globalAlpha = 0.82;
      ctx.fillStyle = C.torsoFill;
      ctx.strokeStyle = strokeCol;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(-tw/2, -th/2);
      ctx.lineTo( tw/2, -th/2);
      ctx.lineTo(0,      tipY);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 1.0;

      // Anchor crosshair at neck
      ctx.strokeStyle=C.anchor; ctx.lineWidth=1; ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.arc(0,-th/2,5,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.strokeStyle=C.anchorDim; ctx.lineWidth=.8;
      ctx.beginPath();
      ctx.moveTo(-7,-th/2); ctx.lineTo(7,-th/2);
      ctx.moveTo(0,-th/2-7); ctx.lineTo(0,-th/2+7);
      ctx.stroke();
      ctx.restore();

    } else {
      // ── Chain layer ─────────────────────────────────────────────────────────
      const tag=layer;
      if(!chains[tag]) continue;
      const js=chains[tag], isSel=tag===sel, chain=puppet.chains[tag];
      const bc=isSel?C.accent:C.bone;

      // Accent outline on back-layer pieces when torso is on top of them
      const behindTorso=['rightArm','rightLeg','head'];
      const torsoCovers=lv.torso && behindTorso.includes(tag);
      if(torsoCovers && !isSel){
        // Draw thin accent outline so back pieces read through torso
        ctx.strokeStyle=C.accent; ctx.lineWidth=2.2; ctx.globalAlpha=0.55;
        ctx.setLineDash([]);
        for(let i=0;i<js.length-1;i++){
          const a=js[i].position, b=js[i+1].position;
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
        ctx.globalAlpha=1.0;
      }
      // Bones — glow when selected
      if(isSel){ ctx.shadowBlur=14; ctx.shadowColor=C.accent; }
      ctx.strokeStyle=bc; ctx.lineWidth=isSel?2.4:1.6; ctx.setLineDash([]);
      for(let i=0;i<js.length-1;i++){
        const a=js[i].position, b=js[i+1].position;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
      ctx.shadowBlur=0;

      // Joints
      for(let i=0;i<js.length-1;i++){
        const p=js[i].position, seg=chain.segs[i];
        let jc=bc;
        if(seg.committed) jc=C.commit;
        else if(seg.influence>.05) jc=C.push;
        else if(seg.influence<-.05) jc=C.pull;
        const r=i===0?4.5:3.2;
        if(isSel){ ctx.shadowBlur=10; ctx.shadowColor=C.accent; }
        ctx.fillStyle=jc; ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=.6; ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur=0;
        if(seg.rigidity){ ctx.strokeStyle=bc; ctx.lineWidth=1; ctx.strokeRect(p.x-r-1,p.y-r-1,(r+1)*2,(r+1)*2); }
        if(Math.abs(seg.influence)>.05&&!seg.committed){
          const ac=seg.influence>0?C.push:C.pull;
          ctx.strokeStyle=ac; ctx.lineWidth=1.3; ctx.setLineDash([2,2]);
          const wa=js[i].worldAngle;
          ctx.beginPath(); ctx.arc(p.x,p.y,9,wa-.6,wa+.6); ctx.stroke(); ctx.setLineDash([]);
          const tip=v2add(p,v2fa(seg.influence>0?wa+.6:wa-.6,9));
          ctx.fillStyle=ac; ctx.beginPath(); ctx.arc(tip.x,tip.y,1.8,0,Math.PI*2); ctx.fill();
        }
      }

      // Handle dot
      const hp=js[js.length-1].position; ctx.setLineDash([]);
      // Pinned foot indicator — ground anchor marker
      if(mode==='IK' && pinnedFeetPos[tag]){
        const pp=pinnedFeetPos[tag];
        ctx.strokeStyle='#b8d820'; ctx.lineWidth=1.5; ctx.globalAlpha=0.7;
        ctx.setLineDash([]);
        // Cross mark at pinned position
        const cr=8;
        ctx.beginPath();
        ctx.moveTo(pp.x-cr,pp.y); ctx.lineTo(pp.x+cr,pp.y);
        ctx.moveTo(pp.x,pp.y-cr/2); ctx.lineTo(pp.x,pp.y+cr/2);
        ctx.stroke();
        // Ground line
        ctx.lineWidth=1; ctx.globalAlpha=0.4;
        ctx.beginPath(); ctx.moveTo(pp.x-cr,pp.y+cr/2); ctx.lineTo(pp.x+cr,pp.y+cr/2); ctx.stroke();
        ctx.globalAlpha=1; ctx.setLineDash([]);
      }
      if(mode==='IK'){
        const hs=isSel?6.5:4.5;
        ctx.shadowBlur=isSel?12:4; ctx.shadowColor=isSel?C.accent:'rgba(180,210,30,.18)';
        ctx.fillStyle=isSel?'#fff':'rgba(190,215,50,.42)';
        ctx.strokeStyle=isSel?C.accent:'rgba(130,170,25,.32)'; ctx.lineWidth=1.6;
        ctx.beginPath(); ctx.arc(hp.x,hp.y,hs,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur=0;
        if(isSel){
          ctx.strokeStyle=C.accent; ctx.lineWidth=.9; ctx.setLineDash([2,2]);
          ctx.beginPath();
          ctx.moveTo(hp.x-10,hp.y); ctx.lineTo(hp.x+10,hp.y);
          ctx.moveTo(hp.x,hp.y-10); ctx.lineTo(hp.x,hp.y+10);
          ctx.stroke(); ctx.setLineDash([]);
        }
      } else {
        ctx.fillStyle=bc; ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=.6;
        ctx.beginPath(); ctx.arc(hp.x,hp.y,isSel?4.5:3,0,Math.PI*2); ctx.fill(); ctx.stroke();
      }
    }
  }

  // Render manikin on top of puppet
  renderManikin(ctx,W,H,puppet,res);
}

// ── Manikin/Reference Figure Rendering ─────────────────────────────────────
function renderManikin(ctx,W,H,puppet,res){
  if(!manikinOn || !puppet) return;
  const {tp,ta,chains}=res;
  const bic = puppet.tw;
  
  ctx.save();
  ctx.translate(tp.x, tp.y);
  ctx.rotate(ta + Math.PI/2);
  
  // Manikin colors
  const strokeColor = 'rgba(180, 180, 220, 0.6)';
  const jointColor = 'rgba(200, 200, 255, 0.8)';
  const lineWidth = 1.5;
  
  ctx.strokeStyle = strokeColor;
  ctx.fillStyle = jointColor;
  ctx.lineWidth = lineWidth;
  ctx.setLineDash([4, 2]);
  
  // Get joint positions from solved chains
  const headPos = chains.head ? chains.head[0].position : {x:0, y:-2.4*bic};
  const neckPos = {x:0, y:-1.3*bic};
  const leftShoulder = {x:-0.5*bic, y:-0.2*bic};
  const rightShoulder = {x:0.5*bic, y:-0.2*bic};
  const leftElbow = chains.leftArm ? chains.leftArm[1].position : {x:-1.2*bic, y:0.8*bic};
  const leftHand = chains.leftArm ? chains.leftArm[2].position : {x:-1.8*bic, y:2.0*bic};
  const rightElbow = chains.rightArm ? chains.rightArm[1].position : {x:1.2*bic, y:0.8*bic};
  const rightHand = chains.rightArm ? chains.rightArm[2].position : {x:1.8*bic, y:2.0*bic};
  const leftHip = {x:-0.33*bic, y:1.1*bic};
  const rightHip = {x:0, y:1.1*bic};
  const leftKnee = chains.leftLeg ? chains.leftLeg[1].position : {x:-0.8*bic, y:2.6*bic};
  const leftFoot = chains.leftLeg ? chains.leftLeg[2].position : {x:-0.6*bic, y:4.1*bic};
  const rightKnee = chains.rightLeg ? chains.rightLeg[1].position : {x:0.3*bic, y:2.6*bic};
  const rightFoot = chains.rightLeg ? chains.rightLeg[2].position : {x:0.5*bic, y:4.1*bic};
  
  // Transform to local coordinates
  const toLocal = (pos) => {
    const angle = -(ta + Math.PI/2);
    const cos = Math.cos(angle);
    const sin = Math.sin(angle);
    return {
      x: pos.x * cos - pos.y * sin,
      y: pos.x * sin + pos.y * cos
    };
  };
  
  // Draw skeleton
  const drawLine = (p1, p2) => {
    const a = toLocal(p1);
    const b = toLocal(p2);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  };
  
  const drawJoint = (pos, radius = 3) => {
    const p = toLocal(pos);
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fill();
  };
  
  // Draw bones
  drawLine(headPos, neckPos);
  drawLine(neckPos, leftShoulder);
  drawLine(neckPos, rightShoulder);
  drawLine(leftShoulder, leftElbow);
  drawLine(leftElbow, leftHand);
  drawLine(rightShoulder, rightElbow);
  drawLine(rightElbow, rightHand);
  drawLine(neckPos, leftHip);
  drawLine(neckPos, rightHip);
  drawLine(leftHip, leftKnee);
  drawLine(leftKnee, leftFoot);
  drawLine(rightHip, rightKnee);
  drawLine(rightKnee, rightFoot);
  
  // Draw joints
  ctx.setLineDash([]);
  drawJoint(headPos, 4);
  drawJoint(neckPos, 2.5);
  drawJoint(leftShoulder, 2.5);
  drawJoint(rightShoulder, 2.5);
  drawJoint(leftElbow, 2);
  drawJoint(rightElbow, 2);
  drawJoint(leftHand, 2);
  drawJoint(rightHand, 2);
  drawJoint(leftHip, 2.5);
  drawJoint(rightHip, 2.5);
  drawJoint(leftKnee, 2);
  drawJoint(rightKnee, 2);
  drawJoint(leftFoot, 3);
  drawJoint(rightFoot, 3);
  
  ctx.restore();
}

const blCvs  = document.getElementById('bl-cvs');
const ppCvs  = document.getElementById('pp-cvs');
const ctxOpts = { alpha: true, desynchronized: true };
const blCtx  = blCvs.getContext('2d', ctxOpts);
const ppCtx  = ppCvs.getContext('2d', ctxOpts);

const tipEl  = document.getElementById('tip');
const szb    = document.getElementById('szb');

let toolbarHidden=false;
let torsoSegments=1; // 1=collar+full torso, 2=collar+upper+lower, 3=collar+upper+mid+waist
let backlitOn=false, negOn=false, lightX=.5, lightY=.5;

let stageRect = stage.getBoundingClientRect();
let stageRectDirty = false;
function markStageRectDirty(){ stageRectDirty = true; }
function getStageRect(){
  if(stageRectDirty){
    stageRect = stage.getBoundingClientRect();
    stageRectDirty = false;
  }
  return stageRect;
}

// ── geometry ──────────────────────────────────────────────────────────────────
function targetGeom(){
  // Stage fills window above toolbar (48px) via CSS inset.
  // We always return the full stage size so canvas fills it edge-to-edge.
  const tbH = toolbarHidden ? 0 : 96; // 48px top + 48px bottom
  const vw = window.innerWidth;
  const vh = window.innerHeight - tbH;
  // Fit the paper ratio inside the stage, edge-to-edge
  let w, h;
  const ratio = Math.max(1.0, lockedRatio);
  if(ratio >= 1){ w=vw; h=Math.round(w/ratio); if(h>vh){h=vh;w=Math.round(h*ratio);} }
  else { h=vh; w=Math.round(h*ratio); if(w>vw){w=vw;h=Math.round(w/ratio);} }
  const x = Math.round((vw-w)/2);
  const y = Math.round((vh-h)/2);
  return {x,y,w,h};
}

// torsoOffset: mutable; FK torso pivots around hips, displacing center
let torsoOffset=v2(0,0);
function torsoPos(){
  return v2(stage.offsetWidth/2+torsoOffset.x, stage.offsetHeight/2+torsoOffset.y);
}

function applyGeom(x,y,w,h,animate){
  // Stage is fixed via CSS (inset); we just sync canvas sizes
  blCvs.width=ppCvs.width=stage.offsetWidth;
  blCvs.height=ppCvs.height=stage.offsetHeight;
  markStageRectDirty();
  drawLight(); rebuildPuppet();
}

function snapToCenter(animate=true){
  applyGeom(0,0,0,0,animate);
  if(szb) szb.textContent='100%';
}

function initStage(){
  function _syncAndBuild(){
    // getBoundingClientRect works correctly inside iframes
    const r=stage.getBoundingClientRect();
    stageRect = r;
    stageRectDirty = false;
    const w=r.width  || window.innerWidth;
    const h=r.height || Math.max(window.innerHeight-96, 200);
    blCvs.width=ppCvs.width=Math.round(w);
    blCvs.height=ppCvs.height=Math.round(h);
    drawLight(); rebuildPuppet();
  }
  // Double-rAF: first frame applies CSS layout, second settles it
  requestAnimationFrame(()=>requestAnimationFrame(_syncAndBuild));
}
initStage();
window.addEventListener('load', ()=>{ snapToCenter(false); });
window.addEventListener('resize',()=>{if(locked)snapToCenter(false);});

// ── puppet ────────────────────────────────────────────────────────────────────

function rebuildPuppet(){
  // Preserve pose angles across resize
  let _sv=null,_sta=null;
  if(puppet){
    _sta=torsoAngle;_sv={};
    for(const tag of TAGS)_sv[tag]=puppet.chains[tag].segs.map(s=>({...s}));
  }
  const W = stage.offsetWidth  || window.innerWidth;
  const H = stage.offsetHeight || (window.innerHeight - 96);

  // Paper border inset (border-image, approx)
  const PAD_TOP  = 14;
  const PAD_BOT  = 14;
  const PAD_SIDE = 14;

  const usableH = H - PAD_TOP - PAD_BOT;
  const usableW = W - PAD_SIDE * 2;

  // Skeletal span in bic units (from head tip to foot tip)
  const SPAN_H = 6.5;   // 2.4 up from torso center + 4.1 down
  const SPAN_W = 5.0;   // arm tip to arm tip (shoulder 0.5 + arm 2 each side)

  // Target: figure fills 2/3 of usable height
  const targetH = usableH * (2/3);
  const bicH = targetH / SPAN_H;
  const bicW = usableW / SPAN_W;
  const bic  = Math.min(bicH, bicW);           // constrain by whichever fits tighter
  const s    = Math.max(0.3, Math.min(2.5, bic / 40));

  puppet = new Puppet(s);

  // ── Ground figure: feet on bottom paper line ──────────────────────────────
  // puppet.tw = bic after construction (tw = bic by design)
  const bic2   = puppet.tw;
  const FOOT_R = 5;  // joint dot radius — bottom edge of foot joint sits on paper line
  const footY  = H - PAD_BOT - FOOT_R;
  const torsoCY = footY - 4.1 * bic2;         // torso center Y
  const torsoCX = W / 2;                       // horizontally centered

  // torsoPos() = stageCenter + torsoOffset
  torsoOffset = v2(torsoCX - W/2, torsoCY - H/2);

  if(_sv){
    torsoAngle=_sta;
    for(const tag of TAGS){
      const ch=puppet.chains[tag];
      (_sv[tag]||[]).forEach((s,i)=>{
        if(i<ch.segs.length) ch.segs[i]={...ch.segs[i],
          localAngle:s.localAngle,committed:s.committed,
          rigidity:s.rigidity,influence:s.influence};
      });
    }
  } else { torsoAngle=REST; }
  const dummy=puppet.solve(torsoPos(),torsoAngle,'FK',{});
  ikTargets=puppet.handles(dummy);
  doSolve();
  if(!_sv) setTimeout(pushUndo,0); // initial snapshot
}


// ── IK body mode helpers ─────────────────────────────────────────────────────
const MIRROR_OF = {leftArm:'rightArm', rightArm:'leftArm',
                   leftLeg:'rightLeg', rightLeg:'leftLeg',
                   head:null, torso:null};

const UPPER_TAGS = new Set(['head','leftArm','rightArm']);
const LOWER_TAGS = new Set(['leftLeg','rightLeg']);

function activeIKTags(draggedTag){
  switch(ikBodyMode){
    case 'single': return new Set([draggedTag]);
    case 'mirror': {
      const s = new Set([draggedTag]);
      const m = MIRROR_OF[draggedTag];
      if(m) s.add(m);
      return s;
    }
    case 'upper':  return UPPER_TAGS;
    case 'lower':  return LOWER_TAGS;
    case 'foot1':
    case 'foot2':
    case 'free':   return new Set(TAGS);
    default:       return new Set(TAGS);
  }
}

// When dragging in mirror mode, mirror the delta onto the opposite chain's target.
// We mirror the DISPLACEMENT relative to torso center X.
function mirrorTarget(tag, pt){
  const tp = solveResult ? solveResult.tp : torsoPos();
  // Mirror X across torso center
  return v2(2*tp.x - pt.x, pt.y);
}

// ── Pinned-foot torso adjustment (iterative, 3 passes) ───────────────────────
// After a normal IK solve, shift torsoOffset so pinned feet stay at their anchors.
function applyPinnedFeet(){
  const pins = Object.entries(pinnedFeetPos);
  if(!pins.length || !puppet || !solveResult) return false;
  let moved = false;
  for(let iter=0; iter<3; iter++){
    // Re-solve with current torsoOffset
    const res = puppet.solve(torsoPos(), torsoAngle, 'IK', ikTargets);
    let dx=0, dy=0, n=0;
    for(const [tag, anchor] of pins){
      const js = res.chains[tag];
      const foot = js[js.length-1].position;
      dx += anchor.x - foot.x;
      dy += anchor.y - foot.y;
      n++;
    }
    if(n===0) break;
    dx/=n; dy/=n;
    if(Math.abs(dx)<0.5 && Math.abs(dy)<0.5) break;
    torsoOffset = v2(torsoOffset.x+dx, torsoOffset.y+dy);
    moved = true;
  }
  // Also update IK targets for non-pinned chains to follow torso shift
  if(moved){
    const res2 = puppet.solve(torsoPos(), torsoAngle, 'FK', {});
    for(const tag of TAGS){
      if(!pinnedFeetPos[tag]) continue; // skip pinned, they're already anchored
    }
  }
  return moved;
}

// Pin/unpin a foot — stores current world foot position as anchor
function pinFoot(tag){
  if(!solveResult) return;
  const js = solveResult.chains[tag];
  pinnedFeetPos[tag] = {...js[js.length-1].position};
}
function unpinFoot(tag){
  delete pinnedFeetPos[tag];
}

var maskReady=false;

// ── Stage boundary clamp ─────────────────────────────────────────────────────
// Runs once per doSolve. Adjusts torsoOffset so no joint exits the canvas.
// Returns true if a correction was made (triggers one re-solve).
const BORDER = 16; // matches paper border-image inset
function clampFigure(){
  if(!puppet||!solveResult||ppCvs.width<10||ppCvs.height<10) return false;
  const W=ppCvs.width, H=ppCvs.height, B=BORDER;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  // Scan all joint positions
  for(const tag of TAGS){
    const js=solveResult.chains[tag]; if(!js) continue;
    for(const j of js){
      const x=j.position.x, y=j.position.y;
      if(x<minX)minX=x; if(x>maxX)maxX=x;
      if(y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  // Also include torso center itself
  const tx=solveResult.tp.x, ty=solveResult.tp.y;
  if(tx<minX)minX=tx; if(tx>maxX)maxX=tx;
  if(ty<minY)minY=ty; if(ty>maxY)maxY=ty;

  const dx = minX<B ? B-minX : maxX>W-B ? (W-B)-maxX : 0;
  const dy = minY<B ? B-minY : maxY>H-B ? (H-B)-maxY : 0;
  if(dx===0&&dy===0) return false;
  torsoOffset=v2(torsoOffset.x+dx, torsoOffset.y+dy);
  if(mode==='IK') for(const k of Object.keys(ikTargets))
    ikTargets[k]=v2(ikTargets[k].x+dx, ikTargets[k].y+dy);
  return true;
}

function doSolve(force=false){
  if(force || perfMode!=='perf'){
    doSolveNow();
    return;
  }
  if(solveQueued) return;
  solveQueued=true;
  requestAnimationFrame(()=>{
    solveQueued=false;
    doSolveNow();
  });
}

function doSolveNow(){
  if(!puppet)return;
  solveResult=puppet.solve(torsoPos(),torsoAngle,mode,ikTargets);
  // Apply pinned-foot torso correction (IK mode only, when feet are anchored)
  if(mode==='IK' && Object.keys(pinnedFeetPos).length){
    applyPinnedFeet();
    solveResult=puppet.solve(torsoPos(),torsoAngle,mode,ikTargets);
  }
  if(clampFigure()) solveResult=puppet.solve(torsoPos(),torsoAngle,mode,ikTargets);
  render(ppCtx,ppCvs.width,ppCvs.height,puppet,solveResult,selChain,mode);
  // Render manikin on top of puppet (drawn last to stay visible)
  renderManikin(ppCtx,ppCvs.width,ppCvs.height,puppet,solveResult);
  if(maskReady) drawMasks();
  if(window._onSolve) window._onSolve();
  if(typeof repositionActiveDock!=='undefined') repositionActiveDock();
}

// ── backlight ─────────────────────────────────────────────────────────────────
function drawLight(){
  const w=blCvs.width,h=blCvs.height;
  blCtx.clearRect(0,0,w,h);if(!backlitOn)return;
  const cx=lightX*w,cy=lightY*h;
  const r=Math.sqrt(Math.max(cx*cx+cy*cy,(w-cx)*(w-cx)+cy*cy,cx*cx+(h-cy)*(h-cy),(w-cx)*(w-cx)+(h-cy)*(h-cy)))*1.05;
  const g=blCtx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,'rgba(245,252,255,.80)');g.addColorStop(.18,'rgba(230,245,255,.64)');
  g.addColorStop(.4,'rgba(200,228,248,.40)');g.addColorStop(.65,'rgba(175,210,240,.18)');
  g.addColorStop(.85,'rgba(155,195,228,.06)');g.addColorStop(1,'rgba(140,180,220,0)');
  blCtx.fillStyle=g;blCtx.fillRect(0,0,w,h);
}

// chain-specific rich tips are generated dynamically in attachTip

function attachTip(el){
  if(!el.dataset.tip)return;
  el.addEventListener('mouseenter',e=>{
    clearTimeout(tipTm);
    tipTm=setTimeout(()=>{
      const id=el.id;
      const rich=RICH_TIP[id];
      const titleEl=document.getElementById('tip-title');
      const bodyEl=document.getElementById('tip-body');
      const kbdEl=document.getElementById('tip-kbd');
      if(rich){
        titleEl.textContent=rich.title||'';
        bodyEl.textContent=rich.body||'';
        kbdEl.textContent=rich.kbd?rich.kbd:'';
        kbdEl.style.display=rich.kbd?'inline-block':'none';
      } else {
        // Fallback: split on " — " or " – "
        const raw=el.dataset.tip||'';
        const sep=raw.indexOf(' — ')>-1?' — ':raw.indexOf(' – ')>-1?' – ':null;
        if(sep){
          const idx=raw.indexOf(sep);
          titleEl.textContent=raw.slice(0,idx);
          bodyEl.textContent=raw.slice(idx+sep.length);
        } else {
          titleEl.textContent=raw;
          bodyEl.textContent='';
        }
        kbdEl.style.display='none';
      }
      const W=window.innerWidth;
      const tw=tipEl.offsetWidth||220;

      tipEl.style.top=Math.max(e.clientY-tipEl.offsetHeight-10,4)+'px';

// ── IK body mode dropdown ────────────────────────────────────────────────────
(function(){
  const MODES = ['free','single','mirror','upper','lower','foot1','foot2'];
  const MODE_LABELS = {
    free:'Free', single:'Single', mirror:'Mirror',
    upper:'Upper', lower:'Lower', foot1:'1 Foot', foot2:'2 Feet'
  };

  const wrapEl  = document.getElementById('ik-mode-wrap');
  const btnEl   = document.getElementById('ik-mode-btn');
  const dropEl  = document.getElementById('ik-mode-dropdown');
  const labelEl = document.getElementById('ik-mode-label');
  const iconEl  = document.getElementById('ik-mode-icon');

  if(!wrapEl || !btnEl || !dropEl) return;

  let dropOpen = false;

  function openDrop(){
    dropEl.style.display='block';
    dropOpen=true;
    btnEl.classList.add('on');
  }
  function closeDrop(){
    dropEl.style.display='none';
    dropOpen=false;
    btnEl.classList.remove('on');
  }

  // Sync button label and active state in dropdown
  function syncUI(){
    if(labelEl) labelEl.textContent = MODE_LABELS[ikBodyMode]||ikBodyMode;
    document.querySelectorAll('.ik-mode-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.ikm===ikBodyMode);
    });
    // Copy active mode's SVG into the header button icon
    const activeBtn = dropEl.querySelector('.ik-mode-btn.active');
    if(activeBtn && iconEl){
      const svg = activeBtn.querySelector('svg');
      if(svg) iconEl.innerHTML = svg.innerHTML;
    }
    // Tint button if mode is active (not free)
    btnEl.classList.toggle('active', ikBodyMode!=='free');
  }

  function setIKMode(m){
    ikBodyMode = m;

    // Clear pins when leaving foot modes
    if(m!=='foot1' && m!=='foot2'){
      delete pinnedFeetPos['leftLeg'];
      delete pinnedFeetPos['rightLeg'];
    }
    if(m==='foot1') pinFoot('rightLeg');
    if(m==='foot2'){ pinFoot('leftLeg'); pinFoot('rightLeg'); }

    // Sync IK targets to current pose on mode switch
    if(mode==='IK' && puppet && solveResult)
      ikTargets = puppet.handles(solveResult);

    syncUI();
    doSolve();
  }

  // Open/close on header button click
  btnEl?.addEventListener('click', e=>{
    e.stopPropagation();
    dropOpen ? closeDrop() : openDrop();
  });

  // Choose a mode from dropdown
  dropEl?.addEventListener('click', e=>{
    e.stopPropagation();
    const btn = e.target.closest('.ik-mode-btn');
    if(!btn) return;

    // Auto-switch to IK when a mode is chosen
    if(mode!=='IK'){
      mode='IK';
      document.getElementById('mode-label').textContent=mode;
      document.getElementById('cb-mode').classList.add('on');
      ppCvs.style.cursor='crosshair';
      if(solveResult) ikTargets=puppet.handles(solveResult);
    }

    setIKMode(btn.dataset.ikm);
    closeDrop();
  });

  // Close on outside click (canvas click keeps current mode)
  document.addEventListener('click', e=>{
    if(!wrapEl?.contains(e.target)) closeDrop();
  }, true);

  // Keyboard: Q cycles, P pins/unpins foot
  window.setIKMode = setIKMode;

function puppetBBox(){
  // Returns bounding box of the puppet in stage coordinates
  if(!solveResult||!puppet) return null;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  const {tp,ta,chains}=solveResult;
  // torso corners
  const tw=puppet.tw,th=puppet.th;
  const d=ta-REST;
  [
    v2(0,-th/2), v2(tw/2,-th/2), v2(tw*0.335,th/2),
    v2(-tw*0.335,th/2), v2(-tw/2,-th/2)
  ].forEach(off=>{
    const wp=v2add(tp,v2rot_(off,d));
    minX=Math.min(minX,wp.x);maxX=Math.max(maxX,wp.x);
    minY=Math.min(minY,wp.y);maxY=Math.max(maxY,wp.y);
  });
  // chain joints
  for(const tag of TAGS){
    const js=chains[tag];
    if(!js)continue;
    js.forEach(j=>{
      minX=Math.min(minX,j.position.x);maxX=Math.max(maxX,j.position.x);
      minY=Math.min(minY,j.position.y);maxY=Math.max(maxY,j.position.y);
    });
  }
  return {minX,maxX,minY,maxY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
}

function stageToViewport(x,y){
  const r=getStageRect();
  return {x:r.left+x, y:r.top+y};
}

function placeDock(floatEl, btnEl){
  // Position dock left or right of the puppet, away from the figure
  const stageR=getStageRect();
  const bb=puppetBBox();
  const dw=floatEl.offsetWidth||180, dh=floatEl.offsetHeight||160;
  const margin=12; // px gap from figure

  // Button position in viewport
  const btnR=btnEl.getBoundingClientRect();
  const btnCX=btnR.left+btnR.width/2;
  const btnCY=btnR.top+btnR.height/2;

  let x, y;

  if(bb){
    // Figure center in viewport
    const figCX=stageR.left+bb.cx;
    const figCY=stageR.top+bb.cy;
    const figLeft=stageR.left+bb.minX;
    const figRight=stageR.left+bb.maxX;
    const figTop=stageR.top+bb.minY;
    const figBot=stageR.top+bb.maxY;

    // Prefer side with more empty space
    const spaceLeft=figLeft-stageR.left;
    const spaceRight=stageR.right-figRight;

    if(spaceRight>=dw+margin){
      // Place right of figure
      x=figRight+margin;
    } else if(spaceLeft>=dw+margin){
      // Place left of figure
      x=figLeft-dw-margin;
    } else {
      // Fallback: whichever side is bigger
      x=spaceRight>spaceLeft ? figRight+margin : figLeft-dw-margin;
    }

    // Vertically: center on figure, clamped to viewport
    y=figCY-dh/2;
  } else {
    // No figure yet — place above button
    x=btnCX-dw/2;
    y=btnR.top-dh-8;
  }

  // Clamp to viewport
  const vw=window.innerWidth, vh=window.innerHeight;
  x=Math.max(4,Math.min(x,vw-dw-4));
  y=Math.max(70,Math.min(y,vh-dh-70));

  floatEl.style.left=x+'px';
  floatEl.style.top=y+'px';
}

function openDock(id){

  const float=srcDock.cloneNode(true);
  float.className='dock-float';

  float.style.flexDirection='column';

  // Re-attach all data-* attributes so event delegation still works

  const chainTag=cg.id.replace('cg-','');
  float.querySelectorAll('[data-chain]').forEach(el=>{
    // already has data-chain from clone — nothing to do

// ── input ─────────────────────────────────────────────────────────────────────
let dragState=null;
function stageXY(e){const r=getStageRect();return v2(e.clientX-r.left,e.clientY-r.top);}
function hitHandle(pt){
  if(!solveResult||mode!=='IK')return null;
  let best=null,bestD=18;
  for(const t of TAGS){const j=solveResult.chains[t],h=j[j.length-1].position,d=v2len(v2sub(pt,h));if(d<bestD){bestD=d;best=t;}}
  return best;
}
function hitJoint(pt){
  // Semantic grab: grabbing the child-end of a segment rotates it intuitively.
  // joint[0] = mount anchor — skip (torso corner grabs handle that)
  // joint[1] = elbow/knee  → rotate seg[0]  (whole limb swings from shoulder/hip)
  // joint[2] = wrist/ankle → rotate seg[1]  (distal only, pivots at elbow/knee)
  if(!solveResult||mode!=='FK')return null;
  let best=null,bestD=14;
  for(const t of TAGS){
    const js=solveResult.chains[t];
    for(let i=1;i<js.length;i++){           // start at 1: skip mount anchor
      const p=js[i].position, d=v2len(v2sub(pt,p));
      if(d<bestD){
        const segIdx=i-1;                   // grab child end → rotate parent segment
        bestD=d; best={tag:t,segIdx,pos:{...js[segIdx].position}};
        // pivot pos = the JOINT where that segment starts, not where we clicked
      }
    }
  }
  return best;
}
function torsoCornerWorld(corner){
  if(!puppet||!solveResult)return v2(0,0);
  const tp2=solveResult.tp, ta=solveResult.ta;
  const tw=puppet.tw, th=puppet.th;
  const lx = corner==='V1' ? tw/2 : -tw/2;
  return v2add(tp2, v2rot_(v2(lx,-th/2), ta+Math.PI/2));
}
function hitTorsoCorner(pt){
  if(!puppet||!solveResult||mode!=='FK')return null;
  const v1=torsoCornerWorld('V1'), v4=torsoCornerWorld('V4');
  if(v2len(v2sub(pt,v1))<13) return 'V1';
  if(v2len(v2sub(pt,v4))<13) return 'V4';
  return null;
}
function hitTorso(pt){
  if(!puppet||!solveResult)return false;
  const tp2=solveResult.tp,ta=solveResult.ta;
  const l=v2rot_(v2sub(pt,tp2),-(ta+Math.PI/2));
  return Math.abs(l.x)<puppet.tw/2+6&&Math.abs(l.y)<puppet.th/2+6;
}

ppCvs.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const pt=stageXY(e);
  // light dot
  if(backlitOn){
    const dp={x:lightX*stage.offsetWidth,y:lightY*stage.offsetHeight};
    if(v2len(v2sub(pt,dp))<14){dragState={type:'light'};ldot.classList.add('show');e.preventDefault();e.stopPropagation();return;}
  }
  // handle
  const h=hitHandle(pt);
  if(h){dragState={type:'handle',tag:h,stageRect:getStageRect()};selChain=h;ppCvs.style.cursor='grabbing';e.preventDefault();e.stopPropagation();return;}
  // FK joint rotation
  const jh=hitJoint(pt);
  if(jh){
    const initAngle=v2angle(v2sub(pt,jh.pos));
    const seg=puppet.chains[jh.tag].segs[jh.segIdx];
    dragState={type:'fk-rotate',tag:jh.tag,segIdx:jh.segIdx,
      jointPos:jh.pos,
      prevAngle:initAngle,  // tracks last frame angle for incremental delta
      accumulated:0,        // total rotation accumulated since drag start
      initLocal:seg.localAngle,
      stageRect:getStageRect()};
    selChain=jh.tag;
    ppCvs.style.cursor='crosshair';
    e.preventDefault();e.stopPropagation();return;
  }
  // torso shoulder corners (V1=right, V4=left) — FK only
  const corner=hitTorsoCorner(pt);
  if(corner){
    const ta=torsoAngle, tp2=torsoPos(), tw=puppet.tw, th=puppet.th;
    // V1 → pivot at right hip   V4 → pivot at left hip
    const hipX = corner==='V1' ? tw*0.335 : -tw*0.335;
    const pivOff=v2rot_(v2(hipX, th/2), ta+Math.PI/2);
    const pivot=v2add(tp2, pivOff);
    const initA=v2angle(v2sub(pt,pivot));
    dragState={type:'fk-torso-rot', pivot,
      prevAngle:initA, accumulated:0, initTorsoA:ta,
      initOffset:{...torsoOffset},
      stageRect:getStageRect()};
    ppCvs.style.cursor='crosshair';
    e.preventDefault();e.stopPropagation();return;
  }
// torso body
  if(hitTorso(pt)){
    selChain='torso';
    if(mode==='FK'){
      const ta=torsoAngle, tp2=torsoPos(), th=puppet.th;
      const pivOff=v2rot_(v2(0, th/2), ta+Math.PI/2);
      const pivot=v2add(tp2, pivOff);
      const initA=v2angle(v2sub(pt, pivot));
      dragState={type:'fk-torso-rot', pivot,
        prevAngle:initA, accumulated:0, initTorsoA:ta,
        initOffset:{...torsoOffset},
        stageRect:getStageRect()};
      ppCvs.style.cursor='crosshair';
    } else {
      dragState={type:e.shiftKey?'torso-rot':'torso-mv',
        sx:e.clientX,sy:e.clientY,oa:torsoAngle,
        oox:torsoOffset.x,ooy:torsoOffset.y,
        stagePosX:stage.offsetLeft,stagePosY:stage.offsetTop};
      ppCvs.style.cursor=e.shiftKey?'crosshair':'grabbing';
    }
    e.preventDefault();e.stopPropagation();return;
  }
  // stage drag (only if free)
  if(!locked){
    dragState={type:'stage',sx:e.clientX,sy:e.clientY,ex:stage.offsetLeft,ey:stage.offsetTop};
    stage.style.cursor='grabbing';e.preventDefault();
  }
});

ppCvs.addEventListener('dblclick',e=>{

  const onHandle = mode==='IK'  && hitHandle(pt);
  const onJoint  = mode==='FK'  && hitJoint(pt);
  const onCorner = mode==='FK'  && hitTorsoCorner(pt);

// free-zone resize
stage.querySelectorAll('.rh').forEach(h=>{

document.addEventListener('mousemove',e=>{
  if(!dragState){
    if(puppet){
      const pt=stageXY(e);
      if(mode==='IK') ppCvs.style.cursor=hitHandle(pt)?'grab':hitTorso(pt)?'move':'crosshair';
      else            ppCvs.style.cursor=hitJoint(pt)?'grab':hitTorsoCorner(pt)?'grab':hitTorso(pt)?'crosshair':'default';
    }
    return;
  }
  const {type}=dragState;
  if(type==='light'){
    const r=getStageRect();
    lightX=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    lightY=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
    placeLdot();drawLight();return;
  }
  if(type==='handle'){
    const r=dragState.stageRect;
    const pt=v2(e.clientX-r.left,e.clientY-r.top);
    const dragged=dragState.tag;
    const active=activeIKTags(dragged);

    // Update dragged target
    ikTargets[dragged]=pt;

    // Mirror mode: reflect onto opposite chain
    if(ikBodyMode==='mirror' && MIRROR_OF[dragged]){
      ikTargets[MIRROR_OF[dragged]]=mirrorTarget(dragged,pt);
    }

    // Upper/lower body: reset non-active targets to current FK positions
    if(ikBodyMode==='upper'||ikBodyMode==='lower'){
      const fkRes=puppet.solve(torsoPos(),torsoAngle,'FK',{});
      for(const t of TAGS){
        if(!active.has(t)) ikTargets[t]=puppet.handles(fkRes)[t];
      }
    }

    // foot1: ensure dominant foot stays pinned (other foot in FK)
    if(ikBodyMode==='foot1'){
      const dom = dragState.dominantFoot||'rightLeg';
      if(!pinnedFeetPos[dom]) pinFoot(dom);
    }
    // foot2: both feet pinned
    if(ikBodyMode==='foot2'){
      if(!pinnedFeetPos['leftLeg'])  pinFoot('leftLeg');
      if(!pinnedFeetPos['rightLeg']) pinFoot('rightLeg');
    }

    doSolve();return;
  }
  if(type==='fk-rotate'){
    const r=dragState.stageRect;
    const pt2=v2(e.clientX-r.left, e.clientY-r.top);
    // Use absolute angle from joint center to cursor, minus initial offset
    // so rotation starts exactly where you clicked with zero jump
    const cur=v2angle(v2sub(pt2,dragState.jointPos));
    let delta=cur-dragState.prevAngle;
    while(delta> Math.PI) delta-=2*Math.PI;
    while(delta<-Math.PI) delta+=2*Math.PI;
    dragState.prevAngle=cur;
    dragState.accumulated+=delta;
    const ch=puppet.chains[dragState.tag];
    const rawLocal=dragState.initLocal+dragState.accumulated;
    const snapped=ch.constrainLocal(dragState.segIdx, rawLocal, 'DRAG');
    ch.segs[dragState.segIdx]={...ch.segs[dragState.segIdx], localAngle:snapped};
    doSolve();return;
  }
  if(type==='torso-mv'){
    const dx=e.clientX-dragState.sx, dy=e.clientY-dragState.sy;
    torsoOffset=v2(dragState.oox+dx, dragState.ooy+dy);
    if(mode==='IK') ikTargets=puppet.handles(puppet.solve(torsoPos(),torsoAngle,'FK',{}));
    doSolve();return;
  }
  if(type==='fk-torso-rot'){
    // Rotate torso; keep pivot (right-leg root) fixed in world space
    const r=dragState.stageRect;
    const pt2=v2(e.clientX-r.left, e.clientY-r.top);
    const cur=v2angle(v2sub(pt2, dragState.pivot));
    let delta=cur-dragState.prevAngle;
    while(delta> Math.PI) delta-=2*Math.PI;
    while(delta<-Math.PI) delta+=2*Math.PI;
    dragState.prevAngle=cur;
    dragState.accumulated+=delta;
    const newA=dragState.initTorsoA+dragState.accumulated;
    torsoAngle=newA;
    // Recompute torsoPos so pivot stays fixed:
    // pivot = torsoPos + rotate(v2(0, th/2), newA+PI/2)
    // torsoPos = pivot - rotate(v2(0, th/2), newA+PI/2)
    const stageCenter=v2(stage.offsetWidth/2, stage.offsetHeight/2);
    const newPivOff=v2rot_(v2(0, puppet.th/2), newA+Math.PI/2);
    const newCenter=v2sub(dragState.pivot, newPivOff);
    torsoOffset=v2sub(newCenter, stageCenter);
    doSolve();return;
  }
  if(type==='torso-rot'){
    torsoAngle=dragState.oa+(e.clientX-dragState.sx)*.013;
    if(mode==='IK')ikTargets=puppet.handles(puppet.solve(torsoPos(),torsoAngle,'FK',{}));
    doSolve();return;
  }
  if(type==='stage'){
    const nx=dragState.ex+e.clientX-dragState.sx,ny=dragState.ey+e.clientY-dragState.sy;
    const BAR=100;
    stage.style.left=Math.min(Math.max(nx,0),window.innerWidth-stage.offsetWidth)+'px';
    stage.style.top=Math.min(Math.max(ny,0),window.innerHeight-BAR-stage.offsetHeight)+'px';
    szb.textContent=Math.round(stage.offsetLeft)+','+Math.round(stage.offsetTop);
    markStageRectDirty();
    return;
  }
  if(type==='resize'){
    const dx=e.clientX-dragState.sx,dy=e.clientY-dragState.sy,dir=dragState.dir;
    let w=dragState.w0,h=dragState.h0,x=dragState.x0,y=dragState.y0;
    if(dir.includes('e'))w=dragState.w0+dx;if(dir.includes('s'))h=dragState.h0+dy;
    if(dir.includes('w')){w=dragState.w0-dx;x=dragState.x0+dragState.w0-w;}
    if(dir.includes('n')){h=dragState.h0-dy;y=dragState.y0+dragState.h0-h;}
    h=Math.round(w/lockedRatio);
    if(dir.includes('w'))x=dragState.x0+dragState.w0-w;
    w=Math.max(180,w);h=Math.max(100,h);
    stage.style.left=x+'px';stage.style.top=y+'px';
    stage.style.width=w+'px';stage.style.height=h+'px';
    blCvs.width=ppCvs.width=w;blCvs.height=ppCvs.height=h;
    drawLight();rebuildPuppet();
    szb.textContent=w+'×'+h;
    markStageRectDirty();
  }
});

document.addEventListener('mouseup',()=>{
  if(dragState?.type==='light')ldot.classList.remove('show');
  if(dragState?.type==='stage')stage.style.cursor='';
  if(dragState?.type?.startsWith('torso')||dragState?.type==='fk-torso-rot')ppCvs.style.cursor=mode==='IK'?'crosshair':'default';
  if(dragState?.type==='handle')ppCvs.style.cursor='grab';
  if(dragState?.type==='fk-rotate')ppCvs.style.cursor='default';
  if(dragState?.type==='mask-drag') maskCvs.style.cursor='';
  dragState=null;
});

const MASK_SLOTS = [
  {key:'torso',   label:'Torso',        tag:'torso',    si:null},
  {key:'head:0',  label:'Head',         tag:'head',     si:0},
  {key:'rArm:0',  label:'R Arm upper',  tag:'rightArm', si:0},
  {key:'rArm:1',  label:'R Arm fore',   tag:'rightArm', si:1},
  {key:'lArm:0',  label:'L Arm upper',  tag:'leftArm',  si:0},
  {key:'lArm:1',  label:'L Arm fore',   tag:'leftArm',  si:1},
  {key:'rLeg:0',  label:'R Thigh',      tag:'rightLeg', si:0},
  {key:'rLeg:1',  label:'R Shin+foot',  tag:'rightLeg', si:1},
  {key:'lLeg:0',  label:'L Thigh',      tag:'leftLeg',  si:0},
  {key:'lLeg:1',  label:'L Shin+foot',  tag:'leftLeg',  si:1},
];

function getMaskSlotByKey(key){
  return MASK_SLOTS.find(s=>s.key===key)||null;
}

const DEFAULT_MASK_PATHS = {
  'head:0': 'Bertie Assets/bones/main_part_01.png',
  'torso':  'Bertie Assets/bones/main_part_02.png',
  'rArm:0': 'Bertie Assets/bones/main_part_03.png',

  'lLeg:0': 'Bertie Assets/bones/main_part_09.png',
  'lLeg:1': 'Bertie Assets/bones/main_part_10.png'
};

function loadDefaultMasks(){
  for(const slot of MASK_SLOTS){
    const path = DEFAULT_MASK_PATHS[slot.key];
    if(!path) continue;
    const img=new Image();
    img.onload=()=>{
      const base={img,ox:0,oy:0,scale:1,rot:0,flip:false,opacity:1};
      if(slot.tag!=='torso'){
        const iw=img.naturalWidth, ih=img.naturalHeight;
        const ax=iw/2, ay=Math.max(0, Math.min(ih*0.1, ih-1));
        base.ax=ax; base.ay=ay; base.axis='y'; base.baseLen=ih-ay;
      }
      masks[slot.key]=base;
      selMask=slot.key;
      buildMaskPanel(); drawMasks();
    };
    img.src=path;
  }
}

function getBoneXform(slot){
  if(!solveResult||!puppet) return null;
  if(slot.tag==='torso'){
    return{
      mx:solveResult.tp.x,my:solveResult.tp.y,
      angle:solveResult.ta+Math.PI/2,len:puppet.th,wid:puppet.tw,
      a:{x:solveResult.tp.x,y:solveResult.tp.y}, b:null
    };
  }
  const js=solveResult.chains[slot.tag];
  if(!js||slot.si==null||slot.si>=js.length-1) return null;
  const a=js[slot.si].position, b=js[slot.si+1].position;
  const len=Math.hypot(b.x-a.x,b.y-a.y);
  return{
    mx:(a.x+b.x)/2,my:(a.y+b.y)/2,
    angle:Math.atan2(b.y-a.y,b.x-a.x),len,wid:len*0.55,
    a:{x:a.x,y:a.y}, b:{x:b.x,y:b.y}
  };
}

function maskUsesAnchor(m){
  return Number.isFinite(m?.ax) && Number.isFinite(m?.ay);
}

function getMaskXform(slot, m){
  const bt=getBoneXform(slot); if(!bt||!m?.img) return null;
  const iw=m.img.naturalWidth, ih=m.img.naturalHeight;
  if(!iw||!ih) return null;
  if(maskUsesAnchor(m) && bt.a){
    const axis = m.axis||'y';
    const baseLen = Number.isFinite(m.baseLen)
      ? m.baseLen
      : (axis==='y' ? (ih - m.ay) : (iw - m.ax));
    const denom = baseLen>1 ? baseLen : (axis==='y' ? ih : iw);
    const s = (bt.len/denom) * (m.scale||1);
    const rot = (axis==='y' ? (bt.angle - Math.PI/2) : bt.angle) + (m.rot||0);
    return{
      mode:'anchor',
      tx:bt.a.x+(m.ox||0), ty:bt.a.y+(m.oy||0),
      rot, sx:(m.flip?-s:s), sy:s,
      iw, ih, ax:m.ax, ay:m.ay
    };
  }
  const dh=bt.len*(m.scale||1), dw=ih>0?(iw/ih)*dh:dh;
  return{
    mode:'center',
    tx:bt.mx+(m.ox||0), ty:bt.my+(m.oy||0),
    rot:bt.angle+(m.rot||0),
    dw, dh, iw, ih
  };
}

function drawMasks(){
  if(maskCvs.width!==ppCvs.width)  maskCvs.width=ppCvs.width;
  if(maskCvs.height!==ppCvs.height) maskCvs.height=ppCvs.height;
  maskCtx2.clearRect(0,0,maskCvs.width,maskCvs.height);
  if(!solveResult) return;
  for(const slot of MASK_SLOTS){
    const m=masks[slot.key]; if(!m?.img) continue;
    const xf=getMaskXform(slot,m); if(!xf) continue;
    maskCtx2.save();
    maskCtx2.globalAlpha=m.opacity??1;
    maskCtx2.translate(xf.tx, xf.ty);
    maskCtx2.rotate(xf.rot);
    if(xf.mode==='anchor'){
      maskCtx2.scale(xf.sx, xf.sy);
      maskCtx2.drawImage(m.img, -xf.ax, -xf.ay);
    } else {
      if(m.flip) maskCtx2.scale(-1,1);
      maskCtx2.drawImage(m.img,-xf.dw/2,-xf.dh/2,xf.dw,xf.dh);
    }
    if(selMask===slot.key){
      maskCtx2.strokeStyle='#b8d820';maskCtx2.lineWidth=1.5;
      maskCtx2.setLineDash([4,3]);
      if(xf.mode==='anchor'){
        maskCtx2.strokeRect(-xf.ax, -xf.ay, xf.iw, xf.ih);
      } else {
        maskCtx2.strokeRect(-xf.dw/2,-xf.dh/2,xf.dw,xf.dh);
      }
      maskCtx2.setLineDash([]);
    }
    maskCtx2.restore();
  }
}

function maskHit(pt){
  if(!solveResult) return null;
  for(let i=MASK_SLOTS.length-1;i>=0;i--){
    const slot=MASK_SLOTS[i],m=masks[slot.key];
    if(!m?.img) continue;
    const xf=getMaskXform(slot,m); if(!xf) continue;
    const dx=pt.x-xf.tx,dy=pt.y-xf.ty;
    const ca=Math.cos(-xf.rot), sa=Math.sin(-xf.rot);
    let lx=dx*ca - dy*sa;
    let ly=dx*sa + dy*ca;
    if(xf.mode==='anchor'){
      lx = lx / xf.sx;
      ly = ly / xf.sy;
      const ix = lx + xf.ax;
      const iy = ly + xf.ay;
      if(ix>-6 && ix<xf.iw+6 && iy>-6 && iy<xf.ih+6) return slot.key;
    } else {
      if(m.flip) lx=-lx;
      if(Math.abs(lx)<xf.dw/2+6&&Math.abs(ly)<xf.dh/2+6) return slot.key;
    }
  }
  return null;
}

        masks[slot.key]=base;

      };img.src=ev.target.result;};
      r.readAsDataURL(f);
    });
    wrap.querySelector('.ms-clr')?.addEventListener('click',()=>{
      delete masks[slot.key];
      if(selMask===slot.key) selMask=null;
      buildMaskPanel(); drawMasks();
    });
    wrap.querySelectorAll('.ms-n').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const m2=masks[inp.dataset.sk]; if(!m2) return;
        const p=inp.dataset.p;
        const raw=inp.value.trim();
        if(raw===''){
          delete m2[p];
          drawMasks();
          return;
        }
        let v=parseFloat(raw);
        if(!isFinite(v)) return;
        if(p==='rot') v=v*Math.PI/180;
        m2[p]=v; drawMasks();
      });
    });
    wrap.querySelector('.ms-flip')?.addEventListener('click',()=>{
      const m2=masks[slot.key]; if(!m2) return;
      m2.flip=!m2.flip; drawMasks();
    });
    wrap.querySelector('.ms-anc')?.addEventListener('click',()=>{
      if(!masks[slot.key]) return;
      anchorPick=slot.key;
    });
    wrap.querySelector('.ms-thumb')?.addEventListener('click',()=>{
      selMask=selMask===slot.key?null:slot.key;
      buildMaskPanel(); drawMasks();
    });
  }
}

maskCvs.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const r=getStageRect();
  const pt={x:e.clientX-r.left,y:e.clientY-r.top};
  if(anchorPick){
    const key=anchorPick;
    const slot=getMaskSlotByKey(key);
    const m=masks[key];
    const xf=slot&&m?getMaskXform(slot,m):null;
    if(xf && xf.mode==='anchor'){
      const dx=pt.x-xf.tx,dy=pt.y-xf.ty;
      const ca=Math.cos(-xf.rot), sa=Math.sin(-xf.rot);
      let lx=dx*ca - dy*sa;
      let ly=dx*sa + dy*ca;
      lx = lx / xf.sx;
      ly = ly / xf.sy;
      const ix = lx + xf.ax;
      const iy = ly + xf.ay;
      if(ix>=0 && ix<=xf.iw && iy>=0 && iy<=xf.ih){
        m.ax = ix; m.ay = iy;
        if(!Number.isFinite(m.baseLen)){
          const axis=m.axis||'y';
          m.baseLen = axis==='y' ? (m.img.naturalHeight - m.ay) : (m.img.naturalWidth - m.ax);
        }
        selMask=key;
        buildMaskPanel(); drawMasks();
      }
    }
    anchorPick=null;
    e.stopPropagation(); e.preventDefault();
    return;
  }
  const hit=maskHit(pt);
  if(hit){
    selMask=hit; buildMaskPanel(); drawMasks();
    const m=masks[hit];
    dragState={type:'mask-drag',key:hit,startPt:{...pt},
               startOx:m.ox||0,startOy:m.oy||0,stageRect:r};
    maskCvs.style.cursor='grabbing';
    e.stopPropagation(); e.preventDefault();
  } else {
    maskCvs.style.pointerEvents='none';
    const el=document.elementFromPoint(e.clientX,e.clientY);
    maskCvs.style.pointerEvents='';
    el?.dispatchEvent(new MouseEvent('mousedown',
      {bubbles:true,cancelable:true,clientX:e.clientX,clientY:e.clientY,button:0}));
  }
});

document.addEventListener('mousemove',e=>{

(function(){

  // ── Serialization ──────────────────────────────────────────────────────────

  function serializeRig(){
    if(!puppet) return null;
    const chains={};
    for(const tag of TAGS){
      const ch=puppet.chains[tag];
      chains[tag]={
        count: ch.count,
        totalLength: +ch.totalLength.toFixed(3),
        segs: ch.segs.map(s=>({
          length:+s.length.toFixed(3),
          rigidity:s.rigidity,
          committed:s.committed,
          influence:+s.influence.toFixed(4),
          localAngle:+s.localAngle.toFixed(5),
        }))
      };
    }
    return {
      version:1,
      mode,
      torsoSegments,
      lockedRatio:+lockedRatio.toFixed(5),
      layerVis:{...puppet.layerVis},
      chains
    };
  }

  function serializePose(){
    if(!puppet) return null;
    const chains={};
    for(const tag of TAGS){
      const ch=puppet.chains[tag];
      chains[tag]=ch.segs.map(s=>({
        localAngle:+s.localAngle.toFixed(5),
        committed:s.committed,
        rigidity:s.rigidity,
        influence:+s.influence.toFixed(4),
      }));
    }
    return {
      version:1,
      torsoAngle:+torsoAngle.toFixed(5),
      torsoOffsetX:+torsoOffset.x.toFixed(3),
      torsoOffsetY:+torsoOffset.y.toFixed(3),
      mode,
      ikTargets: Object.fromEntries(
        Object.entries(ikTargets).map(([k,v])=>[k,{x:+v.x.toFixed(2),y:+v.y.toFixed(2)}])
      ),
      chains
    };
  }

  function applyPose(data){
    if(!data || data.version!==1) throw new Error('Invalid pose — missing version:1');
    if(!puppet) throw new Error('No puppet loaded');

    // Torso
    if(typeof data.torsoAngle==='number') torsoAngle=data.torsoAngle;
    if(typeof data.torsoOffsetX==='number' && typeof data.torsoOffsetY==='number')
      torsoOffset=v2(data.torsoOffsetX, data.torsoOffsetY);

    // Mode
    if(data.mode==='FK'||data.mode==='IK'){
      mode=data.mode;
      const lbl=document.getElementById('mode-label');
      if(lbl) lbl.textContent=mode;
      document.getElementById('cb-mode')?.classList.toggle('on',mode==='IK');
    }

    // Chain segment angles
    if(data.chains){
      for(const tag of TAGS){
        const ch=puppet.chains[tag];
        const segs=data.chains[tag];
        if(!Array.isArray(segs)) continue;
        segs.forEach((s,i)=>{
          if(i>=ch.segs.length) return;
          if(typeof s.localAngle==='number') ch.segs[i]={...ch.segs[i],localAngle:s.localAngle};
          if(typeof s.committed==='boolean') ch.segs[i]={...ch.segs[i],committed:s.committed};
          if(typeof s.rigidity==='boolean')  ch.segs[i]={...ch.segs[i],rigidity:s.rigidity};
          if(typeof s.influence==='number')  ch.segs[i]={...ch.segs[i],influence:s.influence};
        });
      }
    }

    // IK targets
    if(data.ikTargets){
      for(const [k,v] of Object.entries(data.ikTargets)){
        if(typeof v.x==='number'&&typeof v.y==='number') ikTargets[k]=v2(v.x,v.y);
      }
    }

    doSolve();
  }

  // ── UI ─────────────────────────────────────────────────────────────────────

  function fmt(obj){ return JSON.stringify(obj, null, 2); }

  // Tab switching

  function refreshRig(){

  // Speed slider
  const tweenSlider = document.getElementById('dp-tween-ms');

  tweenSlider?.addEventListener('input',()=>{
    const v = parseInt(tweenSlider.value);

  });

  // Apply with tween
  document.getElementById('dp-apply-pose')?.addEventListener('click',()=>{

      const ms = parseInt(tweenSlider?.value ?? 400);
      tweenToPose(data, ms);
      flash(st, ms===0 ? 'Snapped!' : 'Tweening '+ms+'ms…', 'ok');
    } catch(e){
      flash(st,'Error: '+e.message,'err');
    }
  });

  // Snap (instant, ignores slider)
  document.getElementById('dp-snap-pose')?.addEventListener('click',()=>{
    const raw = document.getElementById('dp-paste-in').value.trim();
    const st  = document.getElementById('dp-paste-status');

    try{

      if(!data.version) throw new Error('Missing version field');
      tweenToPose(data, 0);
      flash(st,'Snapped!','ok');
    } catch(e){
      flash(st,'Error: '+e.message,'err');
    }
  });

  document.getElementById('dp-clear-paste')?.addEventListener('click',()=>{
    document.getElementById('dp-paste-in').value='';
    document.getElementById('dp-paste-status').textContent='';
