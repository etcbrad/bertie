  // ── Panel toggle (click) + hover pose card ──────────────────────────────
  function initDataPanel(){
    const btnData   = document.getElementById('btn-data');
    const dataPanel = document.getElementById('data-panel');
    const phcCard   = document.getElementById('pose-hover-card');
    const phcOut    = document.getElementById('phc-out');
    if(!btnData || !dataPanel || !phcCard || !phcOut) return;
    let   phcPinned = false;
    let   phcHoverTm= null;

    // Live-update the hover card whenever pose changes
    function refreshHoverCard(){
      if(!phcCard.classList.contains('open')) return;
      const p=serializePose(); if(!p) return;
      phcOut.value=JSON.stringify(p,null,2);
    }

    // Hook into the existing _onSolve so card stays live while posing
    const _prevOnSolve = window._onSolve;
    window._onSolve = function(){
      if(_prevOnSolve) _prevOnSolve();
      refreshHoverCard();
      // Also live-refresh data panel if pose tab is open
      if(dataPanel.classList.contains('open') &&
         document.querySelector('.dp-tab[data-pane="pose"].active'))
        refreshPose();
    };

    function openCard(){
      phcCard.classList.add('open');
      refreshHoverCard();
      btnData.classList.add('on');
    }
    function closeCard(){
      phcCard.classList.remove('open');
      phcPinned=false;
      // Only remove 'on' if full panel is also closed
      if(!dataPanel.classList.contains('open')) btnData.classList.remove('on');
    }

    // Hover: show card after short delay
    btnData.addEventListener('mouseenter',()=>{
      if(dataPanel.classList.contains('open')) return; // full panel takes over
      clearTimeout(phcHoverTm);
      phcHoverTm=setTimeout(openCard, 180);
    });
    btnData.addEventListener('mouseleave',()=>{
      clearTimeout(phcHoverTm);
      if(!phcPinned) phcHoverTm=setTimeout(closeCard, 300);
    });
    phcCard.addEventListener('mouseenter',()=>{ clearTimeout(phcHoverTm); phcPinned=true; });
    phcCard.addEventListener('mouseleave',()=>{
      phcPinned=false;
      phcHoverTm=setTimeout(closeCard, 300);
    });

    // Copy button in hover card
    document.getElementById('phc-copy-btn')?.addEventListener('click',e=>{
      e.stopPropagation();
      copyPoseJSON();
      const btn=document.getElementById('phc-copy-btn');
      btn.textContent='Copied!'; btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); },1400);
    });

    // Click-away closes card
    document.addEventListener('mousedown',e=>{
      if(!phcCard.classList.contains('open')) return;
      if(!e.target.closest('#pose-hover-card') && !e.target.closest('#btn-data')){
        closeCard();
      }
    });

    // Click btn-data: open full panel (closes hover card)
    btnData.addEventListener('click',e=>{
      e.stopPropagation();
      closeCard();
      clearTimeout(phcHoverTm);
      const opening=!dataPanel.classList.contains('open');
      dataPanel.classList.toggle('open',opening);
      btnData.classList.toggle('on',opening || phcCard.classList.contains('open'));
      if(opening){
        if(document.querySelector('.dp-tab[data-pane="rig"].active')) refreshRig();
        if(document.querySelector('.dp-tab[data-pane="pose"].active')) refreshPose();
      }
    });

    // Close full panel on outside click
    document.addEventListener('mousedown',e=>{
      if(!dataPanel.classList.contains('open')) return;
      if(!e.target.closest('#data-panel') && !e.target.closest('#btn-data')){
        dataPanel.classList.remove('open');
        if(!phcCard.classList.contains('open')) btnData.classList.remove('on');
      }
    });

    // _onSolve is chained above (refreshHoverCard + data panel refresh)

    attachTip && attachTip(btnData);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initDataPanel, {once:true});
  } else {
    initDataPanel();
  }

})();

// ══ TWEEN ENGINE ══════════════════════════════════════════════════════════════
// Lightweight pose interpolator. Lives entirely outside the data panel IIFE
// so doSolve() and the puppet are always in scope.

var tweenActive    = false;   // var → no TDZ
var tweenStartTime = 0;
var tweenDuration  = 400;     // ms, 0 = instant snap
var tweenFrom      = null;    // snapshot of all chain localAngles + torsoAngle
var tweenTo        = null;    // target pose (same shape as tweenFrom)

// Short-angle lerp — always takes the < 180° arc
function lerpAngle(a, b, t){
  let d = ((b - a) % (2*Math.PI) + 3*Math.PI) % (2*Math.PI) - Math.PI;
  return a + d * t;
}

// Ease-in-out cubic
function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

// Capture current pose into a plain object
function capturePose(){
  if(!puppet) return null;
  const chains={};
  for(const tag of TAGS){
    const ch=puppet.chains[tag];
    chains[tag]=ch.segs.map(s=>({
      localAngle:s.localAngle, committed:s.committed,
      rigidity:s.rigidity,    influence:s.influence,
    }));
  }
  return {
    torsoAngle: torsoAngle,
    torsoOffsetX: torsoOffset.x,
    torsoOffsetY: torsoOffset.y,
    chains
  };
}

// Write a captured pose directly to the puppet (no lerp)
function writePose(p){
  if(!p||!puppet) return;
  if(typeof p.torsoAngle==='number')     torsoAngle = p.torsoAngle;
  if(typeof p.torsoOffsetX==='number')   torsoOffset = v2(p.torsoOffsetX, p.torsoOffsetY||0);
  for(const tag of TAGS){
    const ch=puppet.chains[tag];
    const segs=p.chains[tag];
    if(!segs) continue;
    segs.forEach((s,i)=>{
      if(i>=ch.segs.length) return;
      const snapped=typeof s.localAngle==='number'
        ? ch.constrainLocal(i, s.localAngle, 'TWEEN')
        : ch.segs[i].localAngle;
      ch.segs[i]={...ch.segs[i],
        localAngle:snapped, committed:s.committed,
        rigidity:s.rigidity,    influence:s.influence};
    });
  }
}

// Lerp between two captured poses at progress t ∈ [0,1]
function lerpPose(from, to, t){
  if(!puppet) return;
  const ta  = lerpAngle(from.torsoAngle||0, to.torsoAngle||0, t);
  torsoAngle = ta;
  const ox = (from.torsoOffsetX||0) + ((to.torsoOffsetX||0)-(from.torsoOffsetX||0))*t;
  const oy = (from.torsoOffsetY||0) + ((to.torsoOffsetY||0)-(from.torsoOffsetY||0))*t;
  torsoOffset = v2(ox, oy);

  for(const tag of TAGS){
    const ch=puppet.chains[tag];
    const fs=from.chains[tag];
    const ts=to.chains[tag];
    if(!fs||!ts) continue;
    fs.forEach((_,i)=>{
      if(i>=ch.segs.length) return;
      const la = lerpAngle(fs[i].localAngle, ts[i].localAngle, t);
      const snapped = ch.constrainLocal(i, la, 'TWEEN');
      ch.segs[i]={...ch.segs[i], localAngle:snapped};
    });
  }
}

// RAF loop
function tweenTick(now){
  if(!tweenActive) return;
  const elapsed = now - tweenStartTime;
  const raw     = Math.min(elapsed / tweenDuration, 1);
  const t       = easeInOut(raw);

  lerpPose(tweenFrom, tweenTo, t);
  doSolve();

  if(raw < 1){
    requestAnimationFrame(tweenTick);
  } else {
    writePose(tweenTo);   // snap to exact target
    doSolve();
    tweenActive = false;
  }
}

// Public: start a tween to a target pose data object (version:1 JSON)
function tweenToPose(data, durationMs){
  if(!puppet) return;
  // Normalise from version:1 data format to internal capturePose format
  const to = {
    torsoAngle:   typeof data.torsoAngle==='number'   ? data.torsoAngle   : torsoAngle,
    torsoOffsetX: typeof data.torsoOffsetX==='number' ? data.torsoOffsetX : torsoOffset.x,
    torsoOffsetY: typeof data.torsoOffsetY==='number' ? data.torsoOffsetY : torsoOffset.y,
    chains: {}
  };
  for(const tag of TAGS){
    const ch  = puppet.chains[tag];
    const src2= data.chains?.[tag];
    to.chains[tag] = ch.segs.map((s,i)=>({
      localAngle: src2?.[i]?.localAngle ?? s.localAngle,
      committed:  src2?.[i]?.committed  ?? s.committed,
      rigidity:   src2?.[i]?.rigidity   ?? s.rigidity,
      influence:  src2?.[i]?.influence  ?? s.influence,
    }));
  }

  if(!durationMs || durationMs <= 0){
    writePose(to);
    doSolve();
    return;
  }

  tweenFrom      = capturePose();
  tweenTo        = to;
  tweenDuration  = durationMs;
  tweenStartTime = performance.now();
  tweenActive    = true;
  requestAnimationFrame(tweenTick);
}



// ══ UNDO / REDO ══════════════════════════════════════════════════════════════
const MAX_UNDO=60;
var _uStack=[],_uIdx=-1,_uLock=false;

function pushUndo(){
  if(_uLock||!puppet)return;
  const snap=_capPose();
  _uStack.splice(_uIdx+1);
  _uStack.push(snap);
  if(_uStack.length>MAX_UNDO)_uStack.shift();
  _uIdx=_uStack.length-1;
}
function _capPose(){
  const chains={};
  for(const tag of TAGS){
    const ch=puppet.chains[tag];
    chains[tag]=ch.segs.map(s=>({...s}));
  }
  return{torsoAngle,torsoOffsetX:torsoOffset.x,torsoOffsetY:torsoOffset.y,chains};
}
function _applyPoseSnap(p){
  if(!p||!puppet)return;
  torsoAngle=p.torsoAngle;
  torsoOffset=v2(p.torsoOffsetX,p.torsoOffsetY);
  for(const tag of TAGS){
    const ch=puppet.chains[tag];
    (p.chains[tag]||[]).forEach((s,i)=>{
      if(i<ch.segs.length)ch.segs[i]={...ch.segs[i],
        localAngle:s.localAngle,committed:s.committed,
        rigidity:s.rigidity,influence:s.influence};
    });
  }
}
let _undoFlashTm=null;
function _flashUndo(msg){
  const el=document.getElementById('undo-flash');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_undoFlashTm);
  _undoFlashTm=setTimeout(()=>el.classList.remove('show'),900);
}
function undoStep(){
  if(_uIdx<=0)return;
  _uIdx--;_uLock=true;_applyPoseSnap(_uStack[_uIdx]);doSolve();_uLock=false;
  _flashUndo('↩ Undo ('+(_uIdx+1)+'/'+_uStack.length+')');
}
function redoStep(){
  if(_uIdx>=_uStack.length-1)return;
  _uIdx++;_uLock=true;_applyPoseSnap(_uStack[_uIdx]);doSolve();_uLock=false;
  _flashUndo('↪ Redo ('+(_uIdx+1)+'/'+_uStack.length+')');
}
// Push on drag-end
document.addEventListener('mouseup',()=>{
  if(dragState&&['handle','fk-rotate','fk-torso-rot','torso-rot','torso-mv'].includes(dragState.type))
    pushUndo();
});

// ── Reset pose ────────────────────────────────────────────────────────────
function resetPose(){
  pushUndo();
  torsoAngle=REST;
  const W=stage.offsetWidth,H=stage.offsetHeight;
  const bic2=puppet.tw;
  torsoOffset=v2(0,(H-14-5-4.1*bic2)-H/2);  // 5 = FOOT_R
  for(const tag of TAGS)puppet.chains[tag].segs.forEach(s=>{s.localAngle=0;s.committed=false;s.influence=0;s.rigidity=false;});
  if(mode==='IK'){const d=puppet.solve(torsoPos(),torsoAngle,'FK',{});ikTargets=puppet.handles(d);}
  doSolve();
}

// ── Mirror pose ───────────────────────────────────────────────────────────
function mirrorPose(){
  if(!puppet)return;
  pushUndo();
  function swapM(a,b){
    const n=Math.min(a.segs.length,b.segs.length);
    for(let i=0;i<n;i++){const al=a.segs[i].localAngle,bl=b.segs[i].localAngle;a.segs[i]={...a.segs[i],localAngle:-bl};b.segs[i]={...b.segs[i],localAngle:-al};}
  }
  swapM(puppet.chains.leftArm,puppet.chains.rightArm);
  swapM(puppet.chains.leftLeg,puppet.chains.rightLeg);
  torsoAngle=REST-(torsoAngle-REST);
  torsoOffset=v2(-torsoOffset.x,torsoOffset.y);
  if(mode==='IK')ikTargets=puppet.handles(puppet.solve(torsoPos(),torsoAngle,'FK',{}));
  doSolve();
}

// ── Export PNG ────────────────────────────────────────────────────────────
function exportPNG(){
  const c=document.createElement('canvas');
  c.width=ppCvs.width;c.height=ppCvs.height;
  const ctx=c.getContext('2d');
  if(backlitOn)ctx.drawImage(blCvs,0,0);
  ctx.drawImage(ppCvs,0,0);
  const mc=document.querySelector('canvas[style*="z-index:4"]');
  if(mc)ctx.drawImage(mc,0,0);
  const a=document.createElement('a');
  a.download='puppet_'+Date.now()+'.png';
  a.href=c.toDataURL('image/png');a.click();
}


// ── Copy pose JSON to clipboard (Cmd/Ctrl + C) ───────────────────────────────
function copyPoseJSON(){
  if(!puppet) return;
  const chains={};
  for(const tag of TAGS){
    const ch=puppet.chains[tag];
    chains[tag]=ch.segs.map(s=>({
      localAngle:+s.localAngle.toFixed(5),
      committed:s.committed,
      rigidity:s.rigidity,
      influence:+s.influence.toFixed(4),
    }));
  }
  const pose={
    version:1,
    torsoAngle:+torsoAngle.toFixed(5),
    torsoOffsetX:+torsoOffset.x.toFixed(3),
    torsoOffsetY:+torsoOffset.y.toFixed(3),
    mode,
    ikTargets:Object.fromEntries(
      Object.entries(ikTargets).map(([k,v])=>[k,{x:+v.x.toFixed(2),y:+v.y.toFixed(2)}])
    ),
    chains
  };
  const json=JSON.stringify(pose,null,2);
  navigator.clipboard.writeText(json).then(()=>{
    _flashUndo('⎘ Pose JSON copied');
  }).catch(()=>{
    // fallback for restricted clipboard contexts
    const ta=document.createElement('textarea');
    ta.value=json; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    _flashUndo('⎘ Pose JSON copied');
  });
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
(function(){
  const CKEYS={'1':'head','2':'rightArm','3':'leftArm','4':'rightLeg','5':'leftLeg'};
  document.addEventListener('keydown',e=>{
    const t=e.target.tagName;
    if(t==='INPUT'||t==='TEXTAREA'||e.target.isContentEditable)return;
    if(e.ctrlKey||e.metaKey){
      if(e.key==='z'&&!e.shiftKey){e.preventDefault();undoStep();return;}
      if(e.key==='y'||(e.key==='z'&&e.shiftKey)){e.preventDefault();redoStep();return;}
      if(e.key==='c'){e.preventDefault();copyPoseJSON();return;}  // Cmd+C still works
    }
    switch(e.key){
      case ' ':e.preventDefault();document.getElementById('seq-play')?.click();break;
      case 'Escape':openDock&&openDock(null);selChain=null;doSolve();break;
      case 'f':case 'F':document.getElementById('cb-mode')?.click();break;
      case 'r':case 'R':resetPose();break;
      case 'm':case 'M':mirrorPose();break;
      case 'e':case 'E':exportPNG();break;
      case 'c':case 'C':copyPoseJSON();break;
    }
    if(CKEYS[e.key])document.getElementById('cb-'+CKEYS[e.key])?.click();
  });
})();

// ── Pose Library — unlimited banks, A–Z per bank, expand-on-hover, thumbnails ─
(function(){

  // ── Label generation — unlimited banks ────────────────────────────────────
  // Bank 0: A-Z   Bank 1: AA-ZZ   Bank 2: AAA-ZZZ   etc.
  const BASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  function bankLetters(bankIdx){
    const repeat = bankIdx + 1;
    return BASE.map(l => l.repeat(repeat));
  }

  function bankLabel(bankIdx){
    const ll = bankLetters(bankIdx);
    return ll[0] + '–' + ll[ll.length-1];
  }

  // ── Slot factory ──────────────────────────────────────────────────────────
  function makeBank(bankIdx){
    return bankLetters(bankIdx).map(l=>({key:l, label:l, dataUrl:null, pose:null}));
  }

  // ── State (all var — no TDZ) ───────────────────────────────────────────────
  var banks=[makeBank(0)];
  _loadLib();
  var curBank      = 0;
  var activeIdx    = null;
  var seqRunning   = false;
  var seqIdx       = 0;
  var seqTimer     = null;
  var manageMode   = false;
  var useNumbers   = false;
  var railMinimized= false;

  const FRAME_MS  = 1000/24;
  const CLONES    = 6;
  const COMPACT_W = 24;
  const THUMB_W   = 48, THUMB_H = 48;

  function slots(){ return banks[curBank]; }

  // ── Thumbnail ──────────────────────────────────────────────────────────────
  function capThumb(){
    if(!ppCvs) return null;
    const c=document.createElement('canvas'); c.width=THUMB_W; c.height=THUMB_H;
    try{ c.getContext('2d').drawImage(ppCvs,0,0,ppCvs.width,ppCvs.height,0,0,THUMB_W,THUMB_H); }
    catch(e){ return null; }
    return c.toDataURL('image/png',0.7);
  }

  // ── Capture / go ──────────────────────────────────────────────────────────
  function captureSlot(idx){
    const s=slots()[idx]; if(!s) return;
    s.pose=capturePose(); s.dataUrl=capThumb();
    setActive(idx); updateRail(); updateBankNav(); _saveLib();
  }

  function goSlot(idx, ms){
    const s=slots()[idx]; if(!s||!s.pose) return;
    tweenToPose({version:1, torsoAngle:s.pose.torsoAngle,
      torsoOffsetX:s.pose.torsoOffsetX, torsoOffsetY:s.pose.torsoOffsetY,
      chains:Object.fromEntries(Object.entries(s.pose.chains).map(([t,segs])=>
        [t,segs.map(s2=>({localAngle:s2.localAngle,committed:s2.committed,
                           rigidity:s2.rigidity,influence:s2.influence}))]))}, ms);
    setActive(idx);
  }

  function setActive(idx){
    activeIdx=idx;
    document.querySelectorAll('.pose-slot').forEach(b=>{
      b.classList.toggle('active', parseInt(b.dataset.idx)===idx && parseInt(b.dataset.bank)===curBank);
    });
  }

  // ── Bank navigation ────────────────────────────────────────────────────────
  function updateBankNav(){
    const lbl = document.getElementById('bank-lbl');
    const sub = document.getElementById('bank-sub');
    if(lbl) lbl.textContent = bankLabel(curBank);
    if(sub) sub.textContent = 'Bank '+(curBank+1);
    // Dim prev if at first bank
    const prevBtn=document.getElementById('bank-prev');
    if(prevBtn) prevBtn.style.opacity = curBank===0 ? '0.3' : '1';
  }

  function switchBank(idx){
    curBank = Math.max(0, idx);
    // Auto-create bank if needed
    while(banks.length <= curBank) banks.push(makeBank(banks.length));
    activeIdx = null;
    buildLoop(); setupLoopScroll(); updateBankNav();
  }

  document.getElementById('bank-prev')?.addEventListener('click',e=>{
    e.stopPropagation(); if(curBank>0) switchBank(curBank-1);
  });
  document.getElementById('bank-next')?.addEventListener('click',e=>{
    e.stopPropagation(); switchBank(curBank+1);
  });
  document.getElementById('bank-add')?.addEventListener('click',e=>{
    e.stopPropagation(); switchBank(banks.length);  // always adds one more
  });
  // Click the counter itself to cycle forward
  document.getElementById('bank-counter')?.addEventListener('click',e=>{
    e.stopPropagation(); switchBank(curBank+1);
  });

  // ── Slot label ─────────────────────────────────────────────────────────────
  function slotLabel(s, i){
    return useNumbers ? String(curBank*26 + i + 1) : s.label;
  }

  // ── DOM ────────────────────────────────────────────────────────────────────
  const rail = document.getElementById('pose-rail');

  function wireSlot(btn, idx){
    let ht=null, dh=false;
    btn.addEventListener('mousedown',e=>{
      if(manageMode) return;
      e.stopPropagation(); dh=false;
      ht=setTimeout(()=>{ dh=true; captureSlot(idx);
        btn.style.outline='2px solid #b8d820';
        setTimeout(()=>btn.style.outline='',400); },380);
    });
    btn.addEventListener('mouseup',()=>{
      clearTimeout(ht);
      if(!dh&&!manageMode){ slots()[idx]?.pose ? goSlot(idx,tweenDuration) : captureSlot(idx); }
    });
    btn.addEventListener('mouseleave',()=>clearTimeout(ht));
    // Drag reorder
    btn.addEventListener('dragstart',e=>{
      if(!manageMode){e.preventDefault();return;}
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',idx);
      btn.classList.add('dragging');
    });
    btn.addEventListener('dragend',()=>btn.classList.remove('dragging'));
    btn.addEventListener('dragover',e=>{
      if(!manageMode) return;
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      document.querySelectorAll('.pose-slot').forEach(b=>b.classList.remove('drag-over'));
      btn.classList.add('drag-over');
    });
    btn.addEventListener('drop',e=>{
      if(!manageMode) return;
      e.preventDefault(); btn.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain')), to=idx;
      if(from===to) return;
      const arr=slots(); if(!arr) return;
      const [moved]=arr.splice(from,1); arr.splice(to,0,moved);
      buildLoop();
    });
  }

  function buildSlotEl(s, idx){
    const btn=document.createElement('button');
    btn.className='pose-slot'; btn.dataset.idx=idx; btn.dataset.bank=curBank;
    const dot=document.createElement('span'); dot.className='pose-dot';
    const img=document.createElement('img');  img.className='pose-thumb'; img.alt=''; img.draggable=false;
    if(s.dataUrl) img.src=s.dataUrl;
    const lbl=document.createElement('span'); lbl.className='pose-slot-lbl';
    lbl.textContent=slotLabel(s,idx);
    btn.appendChild(dot); btn.appendChild(img); btn.appendChild(lbl);
    if(s.pose) btn.classList.add('filled');
    if(idx===activeIdx) btn.classList.add('active');
    wireSlot(btn, idx);
    return btn;
  }

  function buildRealSlots(){
    [...rail.querySelectorAll('.pose-slot:not(.slot-clone)')].forEach(b=>b.remove());
    const frag=document.createDocumentFragment();
    slots().forEach((s,i)=>frag.appendChild(buildSlotEl(s,i)));
    rail.appendChild(frag);
  }

  function buildLoop(){
    buildRealSlots();
    rail.querySelectorAll('.slot-clone').forEach(c=>c.remove());
    const real=[...rail.querySelectorAll('.pose-slot:not(.slot-clone)')];
    const n=real.length;
    for(let i=0;i<Math.min(CLONES,n);i++){
      const cl=real[i].cloneNode(true); cl.classList.add('slot-clone'); cl.removeAttribute('id');
      rail.appendChild(cl);
    }
    const frag=document.createDocumentFragment();
    for(let i=Math.max(0,n-CLONES);i<n;i++){
      const cl=real[i].cloneNode(true); cl.classList.add('slot-clone'); cl.removeAttribute('id');
      frag.appendChild(cl);
    }
    rail.insertBefore(frag,rail.firstChild);
    const inner=document.getElementById('pose-rail-inner');
    if(inner) inner.scrollLeft=CLONES*COMPACT_W;
  }

  function updateRail(){ buildLoop(); }

  function setupLoopScroll(){
    const inner=document.getElementById('pose-rail-inner');
    if(!inner) return;
    inner.addEventListener('scroll',()=>{
      const n=slots().length, W=COMPACT_W;
      const co=CLONES*W, rt=n*W;
      if(inner.scrollLeft >= co+rt) inner.scrollLeft = co+(inner.scrollLeft-(co+rt));
      else if(inner.scrollLeft < co-W) inner.scrollLeft = co+rt+(inner.scrollLeft-co);
    },{passive:true});
  }

  // ── Sequencer ──────────────────────────────────────────────────────────────
  function seqStep(){
    if(!seqRunning) return;
    const arr=slots(); let a=0,ni=seqIdx;
    while(a<arr.length){ ni=ni%arr.length; if(arr[ni].pose) break; ni++;a++; }
    if(a>=arr.length){stopSeq();return;}
    const idx=ni; seqIdx=(ni+1)%arr.length;
    document.querySelectorAll('.pose-slot').forEach(b=>b.classList.remove('playing'));
    document.querySelectorAll(`.pose-slot[data-idx="${idx}"]`).forEach(b=>b.classList.add('playing'));
    const dur=Math.max(tweenDuration,FRAME_MS);
    goSlot(idx,dur);
    const inner=document.getElementById('pose-rail-inner');
    if(inner) inner.scrollTo({left:(CLONES+idx)*COMPACT_W-inner.clientWidth/2+COMPACT_W/2,behavior:'smooth'});
    seqTimer=setTimeout(seqStep,dur+FRAME_MS);
  }
  function startSeq(){
    if(seqRunning||!slots().some(s=>s.pose)) return;
    seqRunning=true; seqIdx=0;
    document.getElementById('seq-play')?.classList.add('running'); seqStep();
  }
  function stopSeq(){
    seqRunning=false; clearTimeout(seqTimer);
    document.getElementById('seq-play')?.classList.remove('running');
    document.querySelectorAll('.pose-slot').forEach(b=>b.classList.remove('playing'));
  }
  document.getElementById('seq-play')?.addEventListener('click',e=>{e.stopPropagation();seqRunning?stopSeq():startSeq();});
  document.getElementById('seq-stop')?.addEventListener('click',e=>{e.stopPropagation();stopSeq();});

  // ── Library manage bar ─────────────────────────────────────────────────────
  const libBar=document.getElementById('lib-bar');
  const manageBtn=document.getElementById('lib-manage');
  const renameBtn=document.getElementById('lib-rename');
  const numbersBtn=document.getElementById('lib-numbers');
  const clearBtn=document.getElementById('lib-clear');

  let libHold=null;
  document.getElementById('pose-rail-min')?.addEventListener('mousedown',()=>{
    libHold=setTimeout(()=>libBar?.classList.toggle('open'),500);
  });
  document.getElementById('pose-rail-min')?.addEventListener('mouseup',()=>clearTimeout(libHold));
  document.getElementById('pose-rail-min')?.addEventListener('contextmenu',e=>{
    e.preventDefault(); libBar?.classList.toggle('open');
  });
  document.getElementById('lib-close')?.addEventListener('click',()=>libBar?.classList.remove('open'));

  manageBtn?.addEventListener('click',()=>{
    manageMode=!manageMode;
    manageBtn.classList.toggle('active',manageMode);
    document.querySelectorAll('.pose-slot').forEach(b=>{
      b.setAttribute('draggable',manageMode?'true':'false');
      b.style.cursor=manageMode?'grab':'pointer';
    });
  });

  renameBtn?.addEventListener('click',()=>{
    // Re-label slots in current position order with current bank's letter sequence
    const letters=bankLetters(curBank);
    slots().forEach((s,i)=>{ s.label=letters[i]||String(curBank*26+i+1); });
    updateRail();
  });

  numbersBtn?.addEventListener('click',()=>{
    useNumbers=!useNumbers;
    numbersBtn.textContent=useNumbers?'1→A':'A→1';
    numbersBtn.classList.toggle('active',useNumbers);
    updateRail();
  });

  clearBtn?.addEventListener('click',()=>{
    if(!confirm('Clear all poses in Bank '+(curBank+1)+'?')) return;
    banks[curBank]=makeBank(curBank);
    activeIdx=null; updateRail(); updateBankNav(); _saveLib();
  });

  // ── Minimize ───────────────────────────────────────────────────────────────
  const minBtn=document.getElementById('pose-rail-min');
  const minIcon=document.getElementById('prmin-icon');
  const railWrap=document.getElementById('bot-scroll-wrap');
  minBtn?.addEventListener('click',e=>{
    e.stopPropagation(); railMinimized=!railMinimized;
    railWrap.style.display=railMinimized?'none':'';
    minIcon?.setAttribute('points',railMinimized?'2,7 5,3 8,7':'2,3 5,7 8,3');
  });

  // ── Scroll arrows ──────────────────────────────────────────────────────────
  function setupArrows(innerId,lId,rId,step){
    const inner=document.getElementById(innerId);
    document.getElementById(lId)?.addEventListener('click',()=>inner?.scrollBy({left:-step,behavior:'smooth'}));
    document.getElementById(rId)?.addEventListener('click',()=>inner?.scrollBy({left: step,behavior:'smooth'}));
  }

  // ── Speed slider ───────────────────────────────────────────────────────────
  const slider=document.getElementById('tb-tween-ms');
  const slbl=document.getElementById('tb-tween-lbl');
  function syncSliders(ms){
    tweenDuration=ms;
    if(slider) slider.value=ms;
    if(slbl) slbl.textContent=ms===0?'Instant':ms+'ms';
    const d=document.getElementById('dp-tween-ms'),dl=document.getElementById('dp-tween-lbl');
    if(d) d.value=ms; if(dl) dl.textContent=ms===0?'Instant':ms+'ms';
  }
  slider?.addEventListener('input',()=>syncSliders(parseInt(slider.value)));
  document.getElementById('dp-tween-ms')?.addEventListener('input',e=>syncSliders(parseInt(e.target.value)));

  // ── Init ───────────────────────────────────────────────────────────────────
  buildLoop();
  setupLoopScroll();
  updateBankNav();
  setupArrows('pose-rail-inner','bot-arr-l','bot-arr-r',COMPACT_W*5);
  setupArrows('top-scroll-inner','top-arr-l','top-arr-r',48*3);
  attachTip?.(document.getElementById('seq-play'));
  attachTip?.(document.getElementById('seq-stop'));
  attachTip?.(minBtn);

  function _saveLib(){
    try{localStorage.setItem('ppl_v1',JSON.stringify(banks.map(bk=>bk.map(s=>({key:s.key,label:s.label,pose:s.pose||null,dataUrl:s.dataUrl||null})))));}catch(e){}
  }
  function _loadLib(){
    try{
      const d=JSON.parse(localStorage.getItem('ppl_v1')||'null');if(!d)return;
      d.forEach((bk,bi)=>{
        while(banks.length<=bi)banks.push(makeBank(banks.length));
        bk.forEach((sd,si)=>{if(si<banks[bi].length&&sd.pose){banks[bi][si].pose=sd.pose;banks[bi][si].label=sd.label||banks[bi][si].label;if(sd.dataUrl)banks[bi][si].dataUrl=sd.dataUrl;}});
      });
    }catch(e){}
  }

})();

// ── Initialize all features when DOM is ready ─────────────────────────────────
function initializeAllFeatures() {
  // Initialize mode button
  const cbMode = document.getElementById('cb-mode');
  if(cbMode) {
    cbMode.addEventListener('click',()=>{
      mode=mode==='FK'?'IK':'FK';
      document.getElementById('mode-label').textContent=mode;
      document.getElementById('cb-mode').classList.toggle('on',mode==='IK');
      ppCvs.style.cursor=mode==='IK'?'crosshair':'default';
      if(mode==='IK'&&solveResult)ikTargets=puppet.handles(solveResult);
      doSolve();
    });
  }

  // Initialize manikin button
  const btnManikin = document.getElementById('btn-manikin');
  if(btnManikin) {
    btnManikin.classList.toggle('on',manikinOn);
    btnManikin.addEventListener('click',()=>{
      manikinOn=!manikinOn;
      document.getElementById('btn-manikin').classList.toggle('on',manikinOn);
      doSolve();
    });
  }

  // Initialize action buttons
  const btnReset = document.getElementById('btn-reset');
  const btnMirror = document.getElementById('btn-mirror');
  const btnExport = document.getElementById('btn-export');

  if(btnReset) {
    btnReset.addEventListener('click',e=>{e.stopPropagation();resetPose();});
  }

  if(btnMirror) {
    btnMirror.addEventListener('click',e=>{e.stopPropagation();mirrorPose();});
  }

  if(btnExport) {
    btnExport.addEventListener('click',e=>{e.stopPropagation();exportPNG();});
  }

  ['btn-reset','btn-mirror','btn-export'].forEach(id=>{const el=document.getElementById(id);if(el)attachTip(el);});
}

// Wait for DOM to be ready before initializing
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializeAllFeatures);
} else {
  // DOM is already ready
  initializeAllFeatures();
}

// ── Automation hooks for testing ────────────────────────────────────────────
window.render_game_to_text = function(){
  const payload = {
    mode,
    ikBodyMode: (typeof ikBodyMode==='undefined' ? null : ikBodyMode),
    torso: {angle: +torsoAngle.toFixed(4), x: +torsoOffset.x.toFixed(2), y: +torsoOffset.y.toFixed(2)},
    chains: Object.fromEntries(TAGS.map(t=>[t, (puppet?.chains?.[t]?.segs||[]).map(s=>({
      localAngle:+s.localAngle.toFixed(4),
      committed:!!s.committed,
      rigidity:!!s.rigidity
    }))])),
    anchors: Object.fromEntries(MASK_SLOTS.map(s=>[s.key, !!(masks[s.key]?.img)])),
    coordSystem: 'origin=top-left; x=right; y=down'
  };
  return JSON.stringify(payload);
};

window.advanceTime = function(ms){
  // No fixed timestep loop; just re-solve/render deterministically.
  doSolve(true);
};
