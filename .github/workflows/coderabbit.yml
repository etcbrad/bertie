name: CodeRabbit AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  coderabbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: CodeRabbit Review
        uses: coderabbitai/ai-pr-review@latest
        with:
          # Add your CodeRabbit API key as a repository secret
          api_key: ${{ secrets.CODERABBIT_API_KEY }}
          # Optional: Configure review settings
          review_mode: 'comprehensive'
          auto_review: true
          # Optional: Specify files to include/exclude
          include_patterns: |
            **/*.py
            **/*.html
            **/*.js
            **/*.css
            **/*.json
          exclude_patterns: |
            **/*.min.js
            **/node_modules/**
            **/dist/**
